commands_run:
  - command: node --test tests/flux-behaviour-tracker-route-state.test.js tests/flux-semantic-instrumentation.test.js tests/flux-focus-narrative-events.test.js tests/flux-session-lifecycle.test.js
    state: verified
    status: passed
    evidence: Eight focused tests passed for cache coverage, semantic attributes, focus origin and the 30-minute session boundary.
  - command: npm run test:e2e -- --grep 'semantic Flux context|inserted after page load'
    state: observed
    status: failed
    evidence: The first Chromium run exposed an opaque-origin link derivation defect and a selector-audit defect; neither assertion was weakened.
  - command: npm run test:e2e -- --grep 'semantic Flux context|inserted after page load'
    state: verified
    status: passed
    evidence: Both Chromium tests passed across every rendered page and a post-load dynamic insertion path, with no missing, auto or generic semantic attributes.
  - command: live production semantic DOM audit
    state: observed
    status: failed
    evidence: The v1.2.6 production tracker was live, but the tracker-owned Accept and Reject consent controls lacked semantic key and role attributes.
  - command: npm run test:e2e -- --grep 'semantic Flux context|inserted after page load|production consent controls'
    state: verified
    status: passed
    evidence: Three Chromium tests passed, including a production-host regression that creates the consent banner and verifies explicit Accept and Reject semantic keys and roles.
  - command: Codex review thread remediation focused tests
    state: verified
    status: passed
    evidence: Fourteen focused tests passed after three Codex review rounds, including contact-protocol redaction, allow-listed action distinctions, controlled page scopes, distinct checkbox options, framework-attribute exclusion and retained positional fallback; both Chromium coverage tests passed.
  - command: npm run build
    state: verified
    status: passed
    evidence: GOV.UK assets, generated CSS and every canonical static page were rebuilt with tracker cache key v1.2.7 so the consent-control semantic fix cannot be masked by a cached v1.2.6 response.
  - command: npm test
    state: verified
    status: passed
    evidence: All 371 repository tests passed after the consent cache-key Codex review remediation.
  - command: npm run lint
    state: verified
    status: passed
    evidence: Formatting, generated CSS checks and ESLint completed with zero errors; the existing 236-warning baseline remained visible.
  - command: npm run validate
    state: verified
    status: passed
    evidence: Repository contract, operating model, trace coverage, rendered output, sourcebook integrity, JavaScript imports, route-state checks and performance audit completed.
recent_learnings:
  read: true
  updated: true
  entry: Semantic analytics coverage needs both explicit purpose and a structural safety layer.
security:
  secrets_changed: false
  authentication_changed: false
privacy:
  data_collection_scope_changed: false
  assessment: Existing metadata events receive stronger content-free purpose keys. Derivation ignores visible and accessible text, entered values, query strings and arbitrary data values; contact protocols map to fixed purposes; UUID, record-token, long hexadecimal and numeric identifier patterns are stripped.
accessibility:
  required: true
  assessment: Focus-management and display-only tabindex targets are no longer mistaken for controls; custom controls remain covered through their interactive role.
risks:
  - A malformed unforeseen control can still reach the retained positional fallback by product decision.
  - Historical fallback events cannot be safely reconstructed from data that was never captured.
