recent_learnings:
  read: true
  updated: true
  entry: Linguistic analytics needs a declared locale and an on-device privacy boundary.
security:
  secrets_changed: false
  authentication_changed: false
privacy:
  data_collection_scope_changed: true
  assessment: Input-only entry reads inserted data length without retaining content. Entered text is analysed locally after consent; only bounded en-GB issue and casing counts are exported, and text, words and suggestions never leave the page.
accessibility:
  required: true
  assessment: Possible issue counts can be biased by disability, neurodivergence, dialect and language background; person-level and automated-decision uses are prohibited and representative validation remains open.
risks:
  - Dictionary and grammar false positives must be described as possible issues only.
  - Linguistic indicators remain service-friction heuristics, not judgements about a person.
