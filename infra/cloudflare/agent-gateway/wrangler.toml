name = "researchops-agent-gateway"
main = "src/index.ts"
compatibility_date = "2025-09-26"
compatibility_flags = ["nodejs_compat"]

# Vars
[vars]
RESEARCHOPS_ADMIN_ORIGIN = "https://researchops.pages.dev"

# Observability
[observability]
enabled = true

# Audit D1
# Replace database_id before production deployment.
[[d1_databases]]
binding = "AUDIT_DB"
database_name = "researchops-agent-gateway-audit"
database_id = "00000000-0000-0000-0000-000000000000"
