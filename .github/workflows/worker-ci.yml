name: Worker CI

on:
  pull_request:
    paths:
      - "infra/cloudflare/**"
      - "infra/cloudflare/agent-gateway/**"
      - "functions/**"
      - "src/**"
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "deployment-toolchain.yaml"
      - "docs/deployment/wrangler-toolchain.md"
      - ".github/workflows/worker-ci.yml"
      - ".github/workflows/deploy-worker.yml"
      - ".github/workflows/deploy-agent-gateway.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: worker-ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.34.0"

jobs:
  worker-ci:
    name: Validate Cloudflare Workers
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 20.19.0
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation contract
        run: npm run validate

      - name: Check Prettier formatting and capture patch
        id: prettier
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/prettier -c .
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            ./node_modules/.bin/prettier --write .
            git diff -- . > prettier-fix.patch
            cat prettier-fix.patch
            exit "$status"
          fi

      - name: Upload Prettier patch
        if: failure() && steps.prettier.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: prettier-fix.patch
          path: prettier-fix.patch
          if-no-files-found: ignore

      - name: Run ESLint
        run: ./node_modules/.bin/eslint .

      - name: Run unit tests
        run: npm test

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Validate ResearchOps API Worker deployment bundle
        run: npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/wrangler.toml --dry-run

      - name: Validate ResearchOps Agent Gateway Worker deployment bundle
        run: npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/agent-gateway/wrangler.toml --dry-run
