name: Deploy ResearchOps Agent Gateway

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.34.0"

jobs:
  deploy:
    name: Deploy ResearchOps Agent Gateway Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation contract
        run: npm run validate

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Deploy Agent Gateway Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AGENT_GATEWAY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/agent-gateway/wrangler.toml
