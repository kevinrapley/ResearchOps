name: Apply D1 Colleague Auth Users

on:
  push:
    branches: [ main ]
    paths:
      - "infra/cloudflare/migrations/0020_seed_colleague_auth_users.sql"
      - ".github/workflows/apply-d1-colleague-auth-users.yml"
  workflow_dispatch:
    inputs:
      confirm_database_name:
        description: Type researchops-d1 to confirm the target D1 database
        required: true
        type: string
      confirm_operation:
        description: Type SEED_COLLEAGUE_AUTH_USERS to seed colleague accounts without notification emails
        required: true
        type: string
      run_post_apply_checks:
        description: Run post-apply checks
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.90.0"
  D1_DATABASE_NAME: "researchops-d1"
  WRANGLER_CONFIG: "infra/cloudflare/wrangler.toml"
  COLLEAGUE_AUTH_USERS_MIGRATION: "infra/cloudflare/migrations/0020_seed_colleague_auth_users.sql"

jobs:
  apply:
    name: Apply colleague auth user seed to remote D1
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Confirm manual target
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm_database_name }}" != "${D1_DATABASE_NAME}" ]; then
            echo "confirm_database_name must be ${D1_DATABASE_NAME}"
            exit 1
          fi

          if [ "${{ inputs.confirm_operation }}" != "SEED_COLLEAGUE_AUTH_USERS" ]; then
            echo "confirm_operation must be SEED_COLLEAGUE_AUTH_USERS"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Check migration file exists
        run: test -f "${COLLEAGUE_AUTH_USERS_MIGRATION}"

      - name: Apply colleague auth user seed to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${COLLEAGUE_AUTH_USERS_MIGRATION}"

      - name: Check colleague auth user seed
        if: ${{ github.event_name == 'push' || inputs.run_post_apply_checks }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS active_seeded_colleague_users FROM auth_users WHERE account_status = 'active' AND lower(email) IN ('mansoor.mir@homeoffice.gov.uk','lucy.branford-white@digital.homeoffice.gov.uk','laurence.piercy@homeoffice.gov.uk','amy.everett1@homeoffice.gov.uk','rachael.sumner@homeoffice.gov.uk','erin.bramwell@homeoffice.gov.uk','helen.orlando@homeoffice.gov.uk','andrew.warner@homeoffice.gov.uk','andrew.barker6@homeoffice.gov.uk','gillian.woodlock@homeoffice.gov.uk','jenna.murison@homeoffice.gov.uk');"

          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS seeded_colleague_role_assignments FROM auth_role_assignments ra INNER JOIN auth_users u ON u.id = ra.user_id WHERE lower(u.email) IN ('mansoor.mir@homeoffice.gov.uk','lucy.branford-white@digital.homeoffice.gov.uk','laurence.piercy@homeoffice.gov.uk','amy.everett1@homeoffice.gov.uk','rachael.sumner@homeoffice.gov.uk','erin.bramwell@homeoffice.gov.uk','helen.orlando@homeoffice.gov.uk','andrew.warner@homeoffice.gov.uk','andrew.barker6@homeoffice.gov.uk','gillian.woodlock@homeoffice.gov.uk','jenna.murison@homeoffice.gov.uk') AND ra.assignment_status = 'active';"

          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS seeded_colleague_email_code_challenges FROM auth_login_challenges WHERE lower(email) IN ('mansoor.mir@homeoffice.gov.uk','lucy.branford-white@digital.homeoffice.gov.uk','laurence.piercy@homeoffice.gov.uk','amy.everett1@homeoffice.gov.uk','rachael.sumner@homeoffice.gov.uk','erin.bramwell@homeoffice.gov.uk','helen.orlando@homeoffice.gov.uk','andrew.warner@homeoffice.gov.uk','andrew.barker6@homeoffice.gov.uk','gillian.woodlock@homeoffice.gov.uk','jenna.murison@homeoffice.gov.uk');"
