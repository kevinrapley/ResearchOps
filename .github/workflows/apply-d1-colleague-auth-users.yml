name: Apply D1 Colleague Auth Users

on:
  push:
    branches: [ main ]
    paths:
      - "infra/cloudflare/migrations/0020_seed_colleague_auth_users.sql"
      - "infra/cloudflare/migrations/0021_bridge_test_project_1_users_to_visible_team_scope.sql"
      - ".github/workflows/apply-d1-colleague-auth-users.yml"
  workflow_dispatch:
    inputs:
      confirm_database_name:
        description: Type researchops-d1 to confirm the target D1 database
        required: true
        type: string
      confirm_operation:
        description: Type SEED_COLLEAGUE_AUTH_USERS to seed colleague accounts without notification emails
        required: true
        type: string
      run_post_apply_checks:
        description: Run post-apply checks
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.90.0"
  D1_DATABASE_NAME: "researchops-d1"
  WRANGLER_CONFIG: "infra/cloudflare/wrangler.toml"
  COLLEAGUE_AUTH_USERS_MIGRATION: "infra/cloudflare/migrations/0020_seed_colleague_auth_users.sql"
  COLLEAGUE_VISIBLE_SCOPE_MIGRATION: "infra/cloudflare/migrations/0021_bridge_test_project_1_users_to_visible_team_scope.sql"

jobs:
  apply:
    name: Apply colleague auth user seed to remote D1
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Confirm manual target
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm_database_name }}" != "${D1_DATABASE_NAME}" ]; then
            echo "confirm_database_name must be ${D1_DATABASE_NAME}"
            exit 1
          fi

          if [ "${{ inputs.confirm_operation }}" != "SEED_COLLEAGUE_AUTH_USERS" ]; then
            echo "confirm_operation must be SEED_COLLEAGUE_AUTH_USERS"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Check migration files exist
        run: |
          test -f "${COLLEAGUE_AUTH_USERS_MIGRATION}"
          test -f "${COLLEAGUE_VISIBLE_SCOPE_MIGRATION}"

      - name: Apply colleague auth user seed to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${COLLEAGUE_AUTH_USERS_MIGRATION}"

          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${COLLEAGUE_VISIBLE_SCOPE_MIGRATION}"

      - name: Check visible colleague access scope
        if: ${{ github.event_name == 'push' || inputs.run_post_apply_checks }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS visible_scope_memberships FROM auth_team_memberships m INNER JOIN auth_teams t ON t.id = m.team_id WHERE t.id = 'team_home_office_biometrics' AND m.membership_status = 'active';"

          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS visible_scope_role_assignments FROM auth_role_assignments WHERE scope_type = 'team' AND scope_id = 'team_home_office_biometrics' AND assignment_status = 'active';"

          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --command "SELECT COUNT(*) AS visible_scope_audit_events FROM auth_audit_events WHERE event_type = 'auth.colleague_user.visible_team_scope_seeded';"
