name: Generate GitHub bundle source output

on:
  push:
    branches:
      - feature/github-bundle-source-output
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-source-output:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/github-bundle-source-output
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate GitHub bundle source docs
        run: npm run agent:docs:source

      - name: Commit generated source docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/agent-operating-model/bundles/github/source
          if git diff --cached --quiet; then
            echo "No generated source docs changes to commit."
          else
            git commit -m "Generate GitHub bundle source output"
            git push origin HEAD:feature/github-bundle-source-output
          fi
