name: Format pull request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: format-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-24.04
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Check formatting and capture patch
        shell: bash
        run: |
          set +e
          ./node_modules/.bin/prettier -c .
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            ./node_modules/.bin/prettier --write .
            git diff -- . > prettier-fix.patch
            cat prettier-fix.patch
            exit "$status"
          fi

      - name: Upload Prettier patch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: prettier-fix.patch
          path: prettier-fix.patch
          if-no-files-found: ignore
