name: qa-bdd

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        type: string
      publish_reporting_site:
        description: "Publish the walkthrough to the Cloudflare Pages reporting site"
        required: false
        default: true
        type: boolean
  pull_request:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "public/**"
      - "src/**"
      - "features/**"
      - "fixtures/**"
      - "tests/**"
      - "playwright.config.*"
      - "cucumber.*"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/qa-bdd.yml"

permissions:
  contents: read

concurrency:
  group: qa-bdd-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  WRANGLER_VERSION: "4.113.0"
  REPORTING_PAGES_PROJECT: reopsreporting
  REPORTING_PAGES_URL: https://reopsreporting.pages.dev/

jobs:
  bdd-smoke:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        github.event_name == 'pull_request'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine BDD scope
        id: bdd_scope
        shell: bash
        run: |
          set -euo pipefail

          run_bdd="true"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.ref }}"
            git fetch --no-tags --prune --depth=1 origin "${base_ref}"
            changed_files="$(git diff --name-only "origin/${base_ref}"...HEAD)"

            echo "Changed files considered for BDD scope:"
            printf '%s\n' "${changed_files}"

            run_bdd="false"

            while IFS= read -r file_path; do
              [ -z "${file_path}" ] && continue

              case "${file_path}" in
                pages/**|public/**|src/**|features/**|fixtures/**|tests/**|playwright.config.*|cucumber.*|package.json|package-lock.json|.github/workflows/qa-bdd.yml)
                  run_bdd="true"
                  ;;
              esac
            done <<< "${changed_files}"
          fi

          echo "run_bdd=${run_bdd}" >> "$GITHUB_OUTPUT"
          echo "Run BDD smoke suite: ${run_bdd}"

      - name: Record BDD skip reason
        if: steps.bdd_scope.outputs.run_bdd != 'true'
        shell: bash
        run: |
          echo "BDD smoke suite skipped because this pull request does not change public app or BDD test files."
          echo "## BDD smoke suite" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped. This pull request does not change public app or BDD test files." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        run: npx playwright install chromium

      - name: Start local Pages runtime for PR smoke tests
        if: steps.bdd_scope.outputs.run_bdd == 'true' && github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          npx --yes wrangler@${WRANGLER_VERSION} pages dev public --ip 127.0.0.1 --port 8977 > pages-runtime.log 2>&1 &
          echo $! > pages-runtime.pid

          for i in {1..60}; do
            if ! kill -0 "$(cat pages-runtime.pid)" 2>/dev/null; then
              echo "Local Pages runtime exited before becoming available."
              if [ -f pages-runtime.log ]; then cat pages-runtime.log; fi
              exit 1
            fi

            if curl -fsS "http://127.0.0.1:8977/" > /dev/null 2>&1; then
              echo "Local Pages runtime is available."
              exit 0
            fi
            sleep 1
          done

          echo "Local Pages runtime did not become available."
          if [ -f pages-runtime.log ]; then cat pages-runtime.log; fi
          exit 1

      - name: Resolve BASE_URL
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        shell: bash
        run: |
          val="${{ inputs.base_url }}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            val="http://127.0.0.1:8977"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            val="${{ vars.PAGES_URL }}"
          elif [ -z "$val" ]; then
            val="${{ vars.PREVIEW_URL }}"
          fi

          if [ -z "$val" ]; then val="${{ vars.PAGES_URL }}"; fi
          if [ -z "$val" ]; then val="https://researchops.pages.dev/"; fi

          echo "BASE_URL=$val" >> "$GITHUB_ENV"
          echo "Using BASE_URL: $val"

      - name: Wait for smoke routes
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        shell: bash
        run: |
          set -euo pipefail

          for route in "/" "/pages/account/sign-in/index.html" "/pages/start/index.html"; do
            url="${BASE_URL%/}${route}"
            echo "Waiting for smoke route: ${url}"
            curl --fail --silent --show-error --location \
              --connect-timeout 10 \
              --max-time 20 \
              --retry 3 \
              --retry-delay 5 \
              --retry-max-time 90 \
              --retry-all-errors \
              "${url}" >/dev/null
          done

          echo "All smoke routes responded before the BDD run."

      - name: Prepare Cucumber report directory
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        run: mkdir -p reports

      - name: Run BDD smoke suite
        if: steps.bdd_scope.outputs.run_bdd == 'true'
        run: npm run qa:cucumber:ci

      - name: List Cucumber report outputs
        if: always() && steps.bdd_scope.outputs.run_bdd == 'true'
        shell: bash
        run: |
          if [ -d reports ]; then
            find reports -maxdepth 2 -type f -print
          else
            echo "No reports directory was created."
          fi

      - name: Verify Cucumber report outputs
        if: always() && steps.bdd_scope.outputs.run_bdd == 'true'
        id: detect_cucumber_report
        shell: bash
        run: |
          present="false"

          if [ -f "reports/cucumber-report.html" ] && [ -f "reports/cucumber-report.json" ]; then
            present="true"
            echo "Cucumber report artifacts detected."
          else
            echo "Cucumber report artifacts were not generated."
          fi

          echo "present=$present" >> "$GITHUB_OUTPUT"

      - name: Upload Cucumber report
        if: always() && steps.bdd_scope.outputs.run_bdd == 'true' && steps.detect_cucumber_report.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: cucumber-report
          path: |
            reports/cucumber-report.html
            reports/cucumber-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Stop local Pages runtime
        if: always() && steps.bdd_scope.outputs.run_bdd == 'true' && github.event_name == 'pull_request'
        shell: bash
        run: |
          if [ -f pages-runtime.pid ]; then
            pages_runtime_pid="$(cat pages-runtime.pid)"
            if kill -0 "${pages_runtime_pid}" 2>/dev/null; then
              kill "${pages_runtime_pid}"
            fi
          fi

  walkthrough:
    needs: bdd-smoke
    if: >-
      ${{
        needs.bdd-smoke.result == 'success' &&
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve BASE_URL
        shell: bash
        run: |
          val="${{ inputs.base_url }}"
          if [ -z "$val" ]; then val="${{ vars.PREVIEW_URL }}"; fi
          if [ -z "$val" ]; then val="${{ vars.PAGES_URL }}"; fi
          if [ -z "$val" ]; then val="https://researchops.pages.dev/"; fi

          echo "BASE_URL=$val" >> "$GITHUB_ENV"
          echo "Using BASE_URL: $val"

      - name: Resolve report persistence target
        id: persist_target
        shell: bash
        run: |
          enabled="false"
          target_branch="$GITHUB_REF_NAME"

          if [ "$target_branch" = "main" ]; then
            enabled="true"
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"
          echo "Report persistence enabled: $enabled"
          echo "Report persistence target branch: ${target_branch:-none}"

      - name: Diagnose BASE_URL
        shell: bash
        run: |
          curl --fail --silent --show-error --location --connect-timeout 10 --max-time 30 --retry 2 "$BASE_URL" >/dev/null \
            && echo "BASE_URL responded before visual walkthrough run." \
            || echo "BASE_URL did not respond during preflight. Continuing so the visual walkthrough can produce the authoritative result."

      - name: Run application visual walkthrough
        env:
          RESEARCHOPS_QA_BDD_AUTH_EMAIL: qa-bdd.walkthrough@example.gov.uk
          RESEARCHOPS_QA_BDD_AUTH_CODE: ${{ secrets.RESEARCHOPS_QA_BDD_AUTH_CODE }}
        run: npm run qa:visual-walkthrough

      - name: Sync source-derived acceptance criteria
        run: node scripts/sync-report-acceptance-criteria.mjs reports-site

      - name: Render reporting review site from manifest evidence
        run: node scripts/render-reporting-review-site.mjs reports-site

      - name: Detect visual walkthrough site
        id: detect_site
        if: always()
        shell: bash
        run: |
          if [ -f "reports-site/index.html" ] && [ -f "reports-site/manifest.json" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Visual walkthrough site detected."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No visual walkthrough site found."
          fi

      - name: Upload visual walkthrough artifact
        if: always() && steps.detect_site.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: visual-walkthrough-site
          path: reports-site
          if-no-files-found: warn
          retention-days: 14

      - name: Persist visual walkthrough site to repository
        if: >-
          ${{
            steps.detect_site.outputs.present == 'true' &&
            steps.persist_target.outputs.enabled == 'true'
          }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          generated_site="${RUNNER_TEMP}/reports-site-generated"
          rm -rf "$generated_site"
          mkdir -p "$generated_site"
          cp -a reports-site/. "$generated_site/"

          echo "Generated report file changes before persistence:"
          git status --short reports-site

          for attempt in 1 2 3; do
            echo "Persist attempt ${attempt}/3."

            git fetch origin main:refs/remotes/origin/main
            git reset --hard origin/main

            rm -rf reports-site
            mkdir -p reports-site
            cp -a "$generated_site/." reports-site/

            echo "Repository status before staging report files:"
            git status --short reports-site

            git add -A reports-site

            echo "Staged report file changes:"
            git diff --cached --stat

            if git diff --cached --quiet; then
              echo "No reports-site changes to commit."
              exit 0
            fi

            git commit -m "Update application visual walkthrough report"

            if git push origin HEAD:main; then
              echo "Visual walkthrough report persisted to main."
              exit 0
            fi

            echo "Push was not fast-forward. Retrying against the latest main."
          done

          echo "Unable to persist visual walkthrough report after 3 attempts."
          exit 1

      - name: Verify reporting site was updated
        if: >-
          ${{
            steps.detect_site.outputs.present == 'true' &&
            github.event_name == 'workflow_dispatch' &&
            steps.persist_target.outputs.enabled == 'true' &&
            inputs.publish_reporting_site == true
          }}
        shell: bash
        run: |
          expected_started_at="$(node -e "const fs = require('node:fs'); const manifest = JSON.parse(fs.readFileSync('reports-site/manifest.json', 'utf8')); console.log(manifest.startedAt);")"
          echo "Expected reporting timestamp: ${expected_started_at}"

          for attempt in {1..30}; do
            if ! body="$(curl --fail --silent --show-error --location --max-time 10 "${REPORTING_PAGES_URL}?run=${GITHUB_RUN_ID}-${attempt}")"; then
              body=""
            fi
            if printf '%s' "$body" | grep -F "Run started: ${expected_started_at}" >/dev/null; then
              echo "Reporting site updated: ${REPORTING_PAGES_URL}"
              exit 0
            fi
            echo "Reporting site has not updated yet. Attempt ${attempt}/30."
            sleep 10
          done

          echo "Reporting site did not show the generated run timestamp after the Cloudflare Pages GitHub deployment."
          exit 1

      - name: Add job summary
        if: always() && steps.detect_site.outputs.present == 'true'
        shell: bash
        run: |
          echo "## Application visual walkthrough" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The visual walkthrough has been uploaded as the \`visual-walkthrough-site\` workflow artifact." >> "$GITHUB_STEP_SUMMARY"
          echo "Persistence enabled: \`${{ steps.persist_target.outputs.enabled }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Persistence target branch: \`${{ steps.persist_target.outputs.target_branch }}\`." >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.persist_target.outputs.enabled }}" = "true" ]; then
            echo "The \`reports-site\` directory was persisted to the repository when changes were present." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_reporting_site }}" = "true" ] && [ "${{ steps.persist_target.outputs.enabled }}" = "true" ]; then
            echo "Cloudflare Pages was expected to publish the committed report via the project GitHub integration, and the live timestamp was verified at ${REPORTING_PAGES_URL}." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_reporting_site }}" = "true" ] && [ "${{ steps.persist_target.outputs.enabled }}" != "true" ]; then
            echo "Cloudflare Pages live timestamp verification was skipped because this run did not persist \`reports-site\` to main." >> "$GITHUB_STEP_SUMMARY"
          fi
