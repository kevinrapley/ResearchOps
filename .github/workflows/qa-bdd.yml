name: qa-bdd

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        type: string
      publish_reporting_site:
        description: "Publish the walkthrough to the Cloudflare Pages reporting site"
        required: false
        default: true
        type: boolean
  pull_request:
  push:
    branches: [main]
  workflow_run:
    workflows: ["QA • Playwright E2E"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: qa-bdd-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref || github.event.workflow_run.id }}
  cancel-in-progress: true

env:
  CI: true
  WRANGLER_VERSION: "4.34.0"
  REPORTING_PAGES_PROJECT: reopsreporting

jobs:
  bdd-smoke:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve BASE_URL
        shell: bash
        run: |
          val="${{ inputs.base_url }}"
          if [ -z "$val" ]; then val="${{ vars.PREVIEW_URL }}"; fi
          if [ -z "$val" ]; then val="${{ vars.PAGES_URL }}"; fi
          if [ -z "$val" ]; then val="https://researchops.pages.dev/"; fi

          echo "BASE_URL=$val" >> "$GITHUB_ENV"
          echo "Using BASE_URL: $val"

      - name: Preflight BASE_URL
        shell: bash
        run: |
          curl --fail --silent --show-error --location --max-time 10 --retry 2 "$BASE_URL" >/dev/null

      - name: Run BDD smoke suite
        run: npm run qa:cucumber:ci

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            reports/cucumber-report.html
            reports/cucumber-report.json
          if-no-files-found: warn
          retention-days: 14

  walkthrough:
    needs: bdd-smoke
    if: >-
      ${{
        needs.bdd-smoke.result == 'success' &&
        (
          github.event_name == 'workflow_dispatch' ||
          github.ref == 'refs/heads/main'
        )
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve BASE_URL
        shell: bash
        run: |
          val="${{ inputs.base_url }}"
          if [ -z "$val" ]; then val="${{ vars.PREVIEW_URL }}"; fi
          if [ -z "$val" ]; then val="${{ vars.PAGES_URL }}"; fi
          if [ -z "$val" ]; then val="https://researchops.pages.dev/"; fi

          echo "BASE_URL=$val" >> "$GITHUB_ENV"
          echo "Using BASE_URL: $val"

      - name: Preflight BASE_URL
        shell: bash
        run: |
          curl --fail --silent --show-error --location --max-time 10 --retry 2 "$BASE_URL" >/dev/null

      - name: Run BDD visual walkthrough
        run: npm run qa:cucumber:walkthrough

      - name: Merge Cucumber report into walkthrough site
        if: always()
        shell: bash
        run: |
          mkdir -p reports-site
          if [ -f "reports/cucumber-report.html" ]; then
            cp reports/cucumber-report.html reports-site/cucumber-report.html
          fi
          if [ -f "reports/cucumber-report.json" ]; then
            cp reports/cucumber-report.json reports-site/cucumber-report.json
          fi

      - name: Detect walkthrough site
        id: detect_site
        if: always()
        shell: bash
        run: |
          if [ -f "reports-site/index.html" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Walkthrough site detected."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No walkthrough site found."
          fi

      - name: Upload walkthrough artifact
        if: always() && steps.detect_site.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: walkthrough-site
          path: reports-site
          if-no-files-found: warn
          retention-days: 14

      - name: Record Wrangler toolchain version
        if: >-
          ${{
            steps.detect_site.outputs.present == 'true' &&
            github.event_name == 'workflow_dispatch' &&
            inputs.publish_reporting_site == true
          }}
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Deploy walkthrough to Cloudflare Pages reporting site
        if: >-
          ${{
            steps.detect_site.outputs.present == 'true' &&
            github.event_name == 'workflow_dispatch' &&
            inputs.publish_reporting_site == true
          }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --yes wrangler@${WRANGLER_VERSION} pages deploy reports-site --project-name=${REPORTING_PAGES_PROJECT}

      - name: Add job summary
        if: always() && steps.detect_site.outputs.present == 'true'
        shell: bash
        run: |
          echo "## BDD Visual Walkthrough" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The visual walkthrough has been uploaded as the \`walkthrough-site\` workflow artifact." >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_reporting_site }}" = "true" ]; then
            echo "It was also deployed to https://reopsreporting.pages.dev/." >> "$GITHUB_STEP_SUMMARY"
          fi
