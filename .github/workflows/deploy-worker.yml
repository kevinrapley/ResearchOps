name: Deploy ResearchOps Worker

on:
  push:
    branches: [ main, "feature/**" ]
    paths:
      - "infra/cloudflare/**"
      - "!infra/cloudflare/agent-gateway/**"
      - "functions/**"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.90.0"
  WRANGLER_CONFIG: "infra/cloudflare/wrangler.toml"
  WRANGLER_PREVIEW_CONFIG: "infra/cloudflare/wrangler.preview.toml"
  D1_DATABASE_NAME: "researchops-d1"
  D1_PREVIEW_DATABASE_NAME: "researchops-d1-preview"
  PASSWORDLESS_MIGRATION: "infra/cloudflare/migrations/0003_auth_passwordless_sessions.sql"
  PASSWORDLESS_LOCKED_MIGRATION: "infra/cloudflare/migrations/0004_auth_login_challenges_locked_status.sql"
  REGISTRATION_REQUESTS_MIGRATION: "infra/cloudflare/migrations/0005_auth_registration_requests.sql"
  # Keep this workflow path-sensitive so feature-branch Worker state can be refreshed when backend review fixes need redeploying.

jobs:
  deploy-production:
    name: Deploy production Cloudflare Worker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation contract
        run: npm run validate

      - name: Check production passwordless secrets are available
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}
        run: |
          missing=""
          if [ -z "${RESEARCHOPS_AUTH_SECRET}" ]; then missing="${missing} RESEARCHOPS_AUTH_SECRET"; fi
          if [ -z "${RESEND_API_KEY}" ]; then missing="${missing} RESEND_API_KEY"; fi
          if [ -z "${RESEARCHOPS_EMAIL_FROM}" ]; then missing="${missing} RESEARCHOPS_EMAIL_FROM"; fi
          if [ -n "${missing}" ]; then
            echo "Missing required production passwordless secrets:${missing}"
            exit 1
          fi

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Apply auth migrations to production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${PASSWORDLESS_MIGRATION}"
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${PASSWORDLESS_LOCKED_MIGRATION}"
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${REGISTRATION_REQUESTS_MIGRATION}"

      - name: Deploy Worker with production passwordless secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          workingDirectory: infra/cloudflare
          command: deploy --config wrangler.toml
          secrets: |
            RESEARCHOPS_AUTH_SECRET
            RESEND_API_KEY
            RESEARCHOPS_EMAIL_FROM
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}

  deploy-preview:
    name: Deploy preview Cloudflare Worker
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation contract
        run: npm run validate

      - name: Check preview secrets are available
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          missing=""
          if [ -z "${RESEARCHOPS_AUTH_SECRET}" ]; then missing="${missing} RESEARCHOPS_AUTH_SECRET"; fi
          if [ -z "${RESEND_API_KEY}" ]; then missing="${missing} RESEND_API_KEY"; fi
          if [ -z "${RESEARCHOPS_EMAIL_FROM}" ]; then missing="${missing} RESEARCHOPS_EMAIL_FROM"; fi
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then missing="${missing} CF_API_TOKEN"; fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then missing="${missing} CF_ACCOUNT_ID"; fi
          if [ -n "${missing}" ]; then
            echo "Missing required preview secrets:${missing}"
            exit 1
          fi

      - name: Resolve preview D1 database binding
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PREVIEW_D1_DATABASE_ID: ${{ secrets.CF_PREVIEW_D1_DATABASE_ID }}
        run: |
          if [ -n "${CF_PREVIEW_D1_DATABASE_ID}" ]; then
            echo "PREVIEW_D1_DATABASE_ID=${CF_PREVIEW_D1_DATABASE_ID}" >> "${GITHUB_ENV}"
            echo "Using preview D1 database ID from repository secret."
            exit 0
          fi

          npx --yes wrangler@${WRANGLER_VERSION} d1 list --json > d1-databases.json
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          target_name = os.environ["D1_PREVIEW_DATABASE_NAME"]
          production_name = os.environ["D1_DATABASE_NAME"]
          data = json.loads(Path("d1-databases.json").read_text())

          if isinstance(data, dict):
              databases = data.get("result") or data.get("databases") or []
          else:
              databases = data

          def database_id(record):
              return record.get("uuid") or record.get("id") or record.get("database_id")

          preview_matches = [record for record in databases if record.get("name") == target_name]
          production_ids = {
              database_id(record)
              for record in databases
              if record.get("name") == production_name and database_id(record)
          }

          if not preview_matches:
              print(f"Could not find preview D1 database named {target_name}.")
              print("Create it in Cloudflare D1 or set CF_PREVIEW_D1_DATABASE_ID as a repository secret.")
              sys.exit(1)

          preview_id = database_id(preview_matches[0])
          if not preview_id:
              print(f"Preview D1 database {target_name} did not include an ID in wrangler output.")
              sys.exit(1)

          if preview_id in production_ids:
              print("Resolved preview D1 database ID matches the production D1 database ID. Refusing to continue.")
              sys.exit(1)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"PREVIEW_D1_DATABASE_ID={preview_id}\n")

          print(f"Resolved preview D1 database binding for {target_name}.")
          PY

      - name: Create preview Worker config
        run: |
          cp "${WRANGLER_CONFIG}" "${WRANGLER_PREVIEW_CONFIG}"
          python - <<'PY'
          import os
          from pathlib import Path

          preview_database_id = os.environ["PREVIEW_D1_DATABASE_ID"]
          path = Path(os.environ["WRANGLER_PREVIEW_CONFIG"])
          content = path.read_text()
          content = content.replace('name                = "rops-api"', 'name                = "rops-api-passwordless-preview"')
          content = content.replace('database_name = "researchops-d1"', 'database_name = "researchops-d1-preview"')
          content = content.replace('database_id = "48b35a2e-52e8-4bc0-a8cf-88a7a1536f04"', f'database_id = "{preview_database_id}"')
          content = content.replace(
              'https://researchops.pages.dev,https://rops-api.digikev-kevin-rapley.workers.dev,http://localhost:8080,https://reops-sourcebook.pages.dev',
              'https://researchops.pages.dev,https://rops-api-passwordless-preview.digikev-kevin-rapley.workers.dev,https://rops-api.digikev-kevin-rapley.workers.dev,http://localhost:8080,https://reops-sourcebook.pages.dev'
          )
          content = content.replace(
              'MURAL_REDIRECT_URI = "https://rops-api.digikev-kevin-rapley.workers.dev/api/mural/callback"',
              'MURAL_REDIRECT_URI = "https://rops-api-passwordless-preview.digikev-kevin-rapley.workers.dev/api/mural/callback"'
          )
          path.write_text(content)
          PY

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Apply auth migrations to preview D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_PREVIEW_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_PREVIEW_CONFIG}" \
            --file "${PASSWORDLESS_MIGRATION}"
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_PREVIEW_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_PREVIEW_CONFIG}" \
            --file "${PASSWORDLESS_LOCKED_MIGRATION}"
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_PREVIEW_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_PREVIEW_CONFIG}" \
            --file "${REGISTRATION_REQUESTS_MIGRATION}"

      - name: Deploy preview Worker with passwordless secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          workingDirectory: infra/cloudflare
          command: deploy --config wrangler.preview.toml
          secrets: |
            RESEARCHOPS_AUTH_SECRET
            RESEND_API_KEY
            RESEARCHOPS_EMAIL_FROM
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}
