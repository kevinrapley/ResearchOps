name: Publish Walkthrough (Pages)

on:
  workflow_run:
    workflows: ["qa-bdd"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: pages-publish
  cancel-in-progress: false

env:
  WRANGLER_VERSION: "4.87.0"
  REPORTING_PAGES_PROJECT: reopsreporting
  REPORTING_PAGES_URL: https://reopsreporting.pages.dev/

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout reporting tools
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Node toolchain
        shell: bash
        run: |
          node --version
          npm --version

      - name: Download visual walkthrough artifact from qa-bdd
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: visual-walkthrough-site
          path: ./reports-site
          if_no_artifact_found: fail

      - name: Download cucumber report artifact from qa-bdd
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: cucumber-report
          path: ./__cuke
          if_no_artifact_found: fail

      - name: Ensure site has an index
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "reports-site/index.html" ]; then
            mkdir -p reports-site

            {
              printf '%s\n' '<!doctype html>'
              printf '%s\n' '<html lang="en-GB">'
              printf '%s\n' '<head>'
              printf '%s\n' '<meta charset="utf-8">'
              printf '%s\n' '<title>Walkthrough</title>'
              printf '%s\n' '</head>'
              printf '%s\n' '<body>'
              printf '%s\n' '<h1>Walkthrough site not generated for this run.</h1>'
              printf '%s\n' '<p>The qa-bdd workflow did not produce screenshots for this run.</p>'
              printf '%s\n' '</body>'
              printf '%s\n' '</html>'
            } > reports-site/index.html
          fi

      - name: Sync source-derived acceptance criteria
        run: node scripts/sync-report-acceptance-criteria.mjs reports-site

      - name: Merge cucumber evidence into reporting site
        run: node scripts/merge-cucumber-report.mjs

      - name: Verify local reporting site evidence
        shell: bash
        run: |
          set -euo pipefail

          grep -F 'data-state-acceptance-criteria' reports-site/index.html >/dev/null
          grep -F 'What this screen state should support' reports-site/index.html >/dev/null
          grep -F 'Feature:' reports-site/index.html >/dev/null
          grep -F 'As a user researcher' reports-site/index.html >/dev/null
          grep -F 'Access the ResearchOps home page' reports-site/index.html >/dev/null
          grep -F 'So that I can choose the right ResearchOps journey for my work' reports-site/index.html >/dev/null
          grep -F 'What you can do after creating a project' reports-site/index.html >/dev/null
          grep -F 'Turn research evidence into recommendations' reports-site/index.html >/dev/null

          if grep -F 'Choose a journey to explore' reports-site/index.html >/dev/null; then
            echo "Reporting site still contains stale home-page acceptance criteria." >&2
            exit 1
          fi

      - name: Verify Cloudflare Pages project access
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CF_API_TOKEN is not configured for this repository." >&2
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "CF_ACCOUNT_ID is not configured for this repository." >&2
            exit 1
          fi

          response_file="${RUNNER_TEMP}/cloudflare-pages-project.json"
          endpoint="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${REPORTING_PAGES_PROJECT}"

          status="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            --request GET "$endpoint" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" || true)"

          node <<'NODE' "$response_file" "$status" "$REPORTING_PAGES_PROJECT"
          const fs = require('node:fs');

          const [, , responsePath, status, projectName] = process.argv;
          let body = {};

          try {
            body = JSON.parse(fs.readFileSync(responsePath, 'utf8'));
          } catch {
            body = {};
          }

          if (status === '200' && body.success === true) {
            console.log(`Cloudflare Pages project access verified for ${projectName}.`);
            process.exit(0);
          }

          const error = Array.isArray(body.errors) && body.errors.length > 0 ? body.errors[0] : {};
          const code = error.code || 'unknown';
          const message = error.message || 'Cloudflare did not return a readable error message.';

          console.error('Cloudflare Pages access check failed before deployment.');
          console.error(`Endpoint: /accounts/***/pages/projects/${projectName}`);
          console.error(`HTTP status: ${status}`);
          console.error(`Cloudflare error: ${message} [code: ${code}]`);
          console.error('Required secret fix: replace CF_API_TOKEN with a Cloudflare API token from the same account as CF_ACCOUNT_ID.');
          console.error('Required token scope: Account > Cloudflare Pages > Edit for the account that owns this Pages project.');
          console.error('Also confirm the GitHub secret CF_ACCOUNT_ID is the account ID for the Pages project, not another Cloudflare account.');
          process.exit(1);
          NODE

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Deploy visual walkthrough to Cloudflare Pages reporting site
        id: deploy_reporting_site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} pages deploy reports-site \
            --project-name=${REPORTING_PAGES_PROJECT} \
            --branch=main \
            --commit-hash=${{ github.event.workflow_run.head_sha }} \
            --commit-message="Visual walkthrough ${{ github.event.workflow_run.id }}"

      - name: Show Wrangler failure log
        if: ${{ always() && steps.deploy_reporting_site.outcome == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail

          latest="$(ls -t "$HOME/.config/.wrangler/logs"/wrangler-*.log 2>/dev/null | head -n 1 || true)"

          if [ -z "$latest" ]; then
            echo "No Wrangler log file was found."
            exit 0
          fi

          echo "Wrangler log: $latest"
          echo "::group::Wrangler failure log tail"
          tail -n 240 "$latest"
          echo "::endgroup::"

      - name: Upload Wrangler logs
        if: ${{ always() && steps.deploy_reporting_site.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-pages-deploy-logs
          path: ~/.config/.wrangler/logs/*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Verify reporting site was updated
        shell: bash
        run: |
          expected_started_at="$(node -e "const fs = require('node:fs'); const manifest = JSON.parse(fs.readFileSync('reports-site/manifest.json', 'utf8')); console.log(manifest.startedAt);")"
          echo "Expected reporting timestamp: ${expected_started_at}"

          for attempt in {1..18}; do
            body="$(curl --fail --silent --show-error --location --max-time 10 "${REPORTING_PAGES_URL}?run=${GITHUB_RUN_ID}-${attempt}" || true)"
            if printf '%s' "$body" | grep -F "Run started: ${expected_started_at}" >/dev/null; then
              if ! printf '%s' "$body" | grep -F "What this screen state should support" >/dev/null; then
                echo "Reporting site updated but state acceptance criteria details panels were not found." >&2
                exit 1
              fi

              if ! printf '%s' "$body" | grep -F "data-state-acceptance-criteria" >/dev/null; then
                echo "Reporting site updated but the state acceptance criteria details panel marker was not found." >&2
                exit 1
              fi

              if ! printf '%s' "$body" | grep -F "As a user researcher" >/dev/null; then
                echo "Reporting site updated but user-centred acceptance criteria were not found." >&2
                exit 1
              fi

              if ! printf '%s' "$body" | grep -F "Access the ResearchOps home page" >/dev/null; then
                echo "Reporting site updated but the ResearchOps home-page acceptance criteria were not found." >&2
                exit 1
              fi

              if ! printf '%s' "$body" | grep -F "What you can do after creating a project" >/dev/null; then
                echo "Reporting site updated but source-derived home-page criteria were not found." >&2
                exit 1
              fi

              if ! printf '%s' "$body" | grep -F "Turn research evidence into recommendations" >/dev/null; then
                echo "Reporting site updated but current home-page orientation criteria were not found." >&2
                exit 1
              fi

              if printf '%s' "$body" | grep -F "Choose a journey to explore" >/dev/null; then
                echo "Reporting site updated but still contains stale home-page acceptance criteria." >&2
                exit 1
              fi

              echo "Reporting site updated with source-derived state-level Gherkin criteria: ${REPORTING_PAGES_URL}"
              exit 0
            fi
            echo "Reporting site has not updated yet. Attempt ${attempt}/18."
            sleep 10
          done

          echo "Reporting site did not show the generated run timestamp after deployment."
          exit 1

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          echo "## Application visual walkthrough" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The visual walkthrough, route-level Cucumber evidence and source-derived state-level Gherkin acceptance criteria were published to the Cloudflare Pages reporting site." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Open the gallery:** ${REPORTING_PAGES_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open Cucumber report summary](${REPORTING_PAGES_URL}cucumber.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open raw Cucumber HTML report](${REPORTING_PAGES_URL}cucumber/cucumber-report.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> The gallery shows registered application pages and interaction states across desktop and mobile screenshots, with source-derived Gherkin criteria inside each state card." >> "$GITHUB_STEP_SUMMARY"
