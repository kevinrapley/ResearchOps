name: Publish Walkthrough (Pages)

on:
  workflow_run:
    workflows: ["qa-bdd"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download visual walkthrough artifact from qa-bdd
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: visual-walkthrough-site
          path: ./reports-site
          if_no_artifact_found: fail

      - name: Download cucumber HTML report
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: cucumber-report
          path: ./__cuke
          if_no_artifact_found: warn

      - name: Merge cucumber report into site
        run: |
          mkdir -p reports-site
          if [ -f "__cuke/cucumber-report.html" ]; then
            mv __cuke/cucumber-report.html reports-site/
          fi

      - name: Ensure site has an index
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "reports-site/index.html" ]; then
            mkdir -p reports-site

            {
              printf '%s\n' '<!doctype html>'
              printf '%s\n' '<html lang="en-GB">'
              printf '%s\n' '<head>'
              printf '%s\n' '<meta charset="utf-8">'
              printf '%s\n' '<title>Walkthrough</title>'
              printf '%s\n' '</head>'
              printf '%s\n' '<body>'
              printf '%s\n' '<h1>Walkthrough site not generated for this run.</h1>'
              printf '%s\n' '<p>The qa-bdd workflow did not produce screenshots for this run.</p>'
              printf '%s\n' '</body>'
              printf '%s\n' '</html>'
            } > reports-site/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add job summary
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "## Application visual walkthrough" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Open the gallery:** ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open Cucumber HTML report](${URL}cucumber-report.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> The gallery shows registered application pages and interaction states across desktop and mobile screenshots." >> "$GITHUB_STEP_SUMMARY"
