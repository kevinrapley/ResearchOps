name: Publish Walkthrough (Pages)

on:
  workflow_run:
    workflows: ["qa-bdd"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: pages-publish
  cancel-in-progress: false

env:
  WRANGLER_VERSION: "4.34.0"
  REPORTING_PAGES_PROJECT: reopsreporting
  REPORTING_PAGES_URL: https://reopsreporting.pages.dev/

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout reporting tools
        uses: actions/checkout@v4

      - name: Download visual walkthrough artifact from qa-bdd
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: visual-walkthrough-site
          path: ./reports-site
          if_no_artifact_found: fail

      - name: Download cucumber report artifact from qa-bdd
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: qa-bdd
          run_id: ${{ github.event.workflow_run.id }}
          name: cucumber-report
          path: ./__cuke
          if_no_artifact_found: fail

      - name: Ensure site has an index
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "reports-site/index.html" ]; then
            mkdir -p reports-site

            {
              printf '%s\n' '<!doctype html>'
              printf '%s\n' '<html lang="en-GB">'
              printf '%s\n' '<head>'
              printf '%s\n' '<meta charset="utf-8">'
              printf '%s\n' '<title>Walkthrough</title>'
              printf '%s\n' '</head>'
              printf '%s\n' '<body>'
              printf '%s\n' '<h1>Walkthrough site not generated for this run.</h1>'
              printf '%s\n' '<p>The qa-bdd workflow did not produce screenshots for this run.</p>'
              printf '%s\n' '</body>'
              printf '%s\n' '</html>'
            } > reports-site/index.html
          fi

      - name: Merge cucumber evidence into reporting site
        run: node scripts/merge-cucumber-report.mjs

      - name: Verify Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CF_API_TOKEN is not configured for this repository." >&2
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "CF_ACCOUNT_ID is not configured for this repository." >&2
            exit 1
          fi

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Deploy visual walkthrough to Cloudflare Pages reporting site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} pages deploy reports-site \
            --project-name=${REPORTING_PAGES_PROJECT} \
            --branch=main \
            --commit-hash=${{ github.event.workflow_run.head_sha }} \
            --commit-message="Visual walkthrough ${{ github.event.workflow_run.id }}"

      - name: Verify reporting site was updated
        shell: bash
        run: |
          expected_started_at="$(node -e "const fs = require('node:fs'); const manifest = JSON.parse(fs.readFileSync('reports-site/manifest.json', 'utf8')); console.log(manifest.startedAt);")"
          echo "Expected reporting timestamp: ${expected_started_at}"

          for attempt in {1..18}; do
            body="$(curl --fail --silent --show-error --location --max-time 10 "${REPORTING_PAGES_URL}?run=${GITHUB_RUN_ID}-${attempt}" || true)"
            if printf '%s' "$body" | grep -F "Run started: ${expected_started_at}" >/dev/null; then
              echo "Reporting site updated: ${REPORTING_PAGES_URL}"
              exit 0
            fi
            echo "Reporting site has not updated yet. Attempt ${attempt}/18."
            sleep 10
          done

          echo "Reporting site did not show the generated run timestamp after deployment."
          exit 1

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          echo "## Application visual walkthrough" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The visual walkthrough and Cucumber evidence were published to the Cloudflare Pages reporting site." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Open the gallery:** ${REPORTING_PAGES_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open Cucumber report summary](${REPORTING_PAGES_URL}cucumber.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open raw Cucumber HTML report](${REPORTING_PAGES_URL}cucumber/cucumber-report.html)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> The gallery shows registered application pages and interaction states across desktop and mobile screenshots, with route-level Cucumber evidence where scenarios map to a route." >> "$GITHUB_STEP_SUMMARY"
