name: Temporary GOV.UK Frontend v6 update

on:
  push:
    branches:
      - chore/govuk-frontend-integration

permissions:
  contents: write

jobs:
  update:
    if: github.ref == 'refs/heads/chore/govuk-frontend-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/govuk-frontend-integration
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Update package metadata and generated assets
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.dependencies = pkg.dependencies || {};
          pkg.dependencies['govuk-frontend'] = '^6.0.0';
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`, 'utf8');
          NODE
          npm install
          npm run build:govuk
          rm .github/workflows/_temporary-govuk-frontend-v6.yml
      - name: Commit update
        run: |
          git config user.name "researchops-agent"
          git config user.email "researchops-agent@users.noreply.github.com"
          git add -A
          git add -f package-lock.json public/assets/govuk
          if git diff --cached --quiet; then
            echo "No GOV.UK Frontend v6 changes"
            exit 0
          fi
          git commit -m "Use GOV.UK Frontend v6 integration assets"
          git push origin HEAD:chore/govuk-frontend-integration
