# Deploys the rops-api-passwordless-preview Worker that the Pages Function
# proxy on *.researchops.pages.dev forwards /api/* traffic to. Keep push.branches
# aligned with the approved work-branch prefixes so any PR's Pages preview is
# served by a Worker on the same branch. Project-page route work is included in
# the path filter because those pages depend on this shared preview Worker.
name: Deploy Passwordless Preview Worker

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
      - "test/**"
      - "fix/**"
      - "perf/**"
      - "hotfix/**"
    paths:
      - "infra/cloudflare/**"
      - "public/pages/account/sign-in/**"
      - "public/pages/projects/**"
      - "public/pages/project-dashboard/**"
      - "public/js/auth-sign-in-page.js"
      - "public/js/projects-page.js"
      - "public/js/project-dashboard.js"
      - "functions/api/**"
      - "tests/auth-sign-in-route-state.test.js"
      - "tests/projects-page-route-state.test.js"
      - "tests/project-dashboard-route-state.test.js"
      - "tests/studies-route-contract.test.js"
      - ".github/workflows/deploy-passwordless-preview-worker.yml"
  workflow_dispatch:
    inputs:
      confirm_worker_name:
        description: Type rops-api-passwordless-preview to confirm the preview Worker target
        required: true
        type: string
      confirm_database_name:
        description: Type researchops-d1 to confirm the D1 migration target
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.34.0"
  WRANGLER_CONFIG: "infra/cloudflare/wrangler.passwordless-preview.toml"
  D1_DATABASE_NAME: "researchops-d1"
  PREVIEW_PROJECT_SEED_MIGRATION: "infra/cloudflare/migrations/preview/0002_seed_projects_cache.sql"
  PASSWORDLESS_MIGRATION: "infra/cloudflare/migrations/0003_auth_passwordless_sessions.sql"
  PREVIEW_WORKER_NAME: "rops-api-passwordless-preview"

jobs:
  deploy-preview:
    name: Deploy passwordless preview Worker
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - name: Show deploy source
        run: |
          echo "Deploying preview Worker from:"
          echo "  ref:        ${GITHUB_REF}"
          echo "  branch:     ${GITHUB_REF_NAME}"
          echo "  sha:        ${GITHUB_SHA}"
          echo "  event:      ${GITHUB_EVENT_NAME}"
          echo "  actor:      ${GITHUB_ACTOR}"
          echo "  target:     ${PREVIEW_WORKER_NAME}"
          echo
          echo "Reminder: workflow_dispatch defaults to the branch in 'Use workflow from'."
          echo "Set that to the PR branch (e.g. fix/...) before dispatching, otherwise the"
          echo "preview Worker is rolled back to main and unrelated PR branch previews"
          echo "stop matching their Pages preview assets."

      - name: Confirm manual target
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${{ inputs.confirm_worker_name }}" != "${PREVIEW_WORKER_NAME}" ]; then
            echo "confirm_worker_name must be ${PREVIEW_WORKER_NAME}"
            exit 1
          fi

          if [ "${{ inputs.confirm_database_name }}" != "${D1_DATABASE_NAME}" ]; then
            echo "confirm_database_name must be ${D1_DATABASE_NAME}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp Worker build metadata
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["WRANGLER_CONFIG"])
          text = path.read_text(encoding="utf-8")
          for key in ("RESEARCHOPS_BUILD_SHA", "RESEARCHOPS_BUILD_BRANCH"):
              text = "\n".join(
                  line for line in text.splitlines()
                  if not line.strip().startswith(f"{key} =")
              ) + "\n"
          marker = "[vars]\n"
          if marker not in text:
              raise SystemExit("[vars] block not found in Wrangler config")
          stamped = (
              marker
              + f"RESEARCHOPS_BUILD_SHA = \"{os.environ['GITHUB_SHA']}\"\n"
              + f"RESEARCHOPS_BUILD_BRANCH = \"{os.environ['GITHUB_REF_NAME']}\"\n"
          )
          path.write_text(text.replace(marker, stamped, 1), encoding="utf-8")
          PY

      - name: Run validation contract
        run: npm run validate

      - name: Check preview secrets are available
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEARCHOPS_EMAIL_WEBHOOK_URL: ${{ secrets.RESEARCHOPS_EMAIL_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          MURAL_CLIENT_SECRET: ${{ secrets.MURAL_CLIENT_SECRET }}
        run: |
          if [ -z "${RESEARCHOPS_AUTH_SECRET}" ]; then
            echo "Missing required secret: RESEARCHOPS_AUTH_SECRET"
            exit 1
          fi

          if [ -z "${RESEARCHOPS_EMAIL_WEBHOOK_URL}" ] && { [ -z "${RESEND_API_KEY}" ] || [ -z "${RESEARCHOPS_EMAIL_FROM}" ]; }; then
            echo "Configure either RESEARCHOPS_EMAIL_WEBHOOK_URL or both RESEND_API_KEY and RESEARCHOPS_EMAIL_FROM"
            exit 1
          fi

          if [ -z "${AIRTABLE_BASE_ID}" ]; then
            echo "Missing required secret: AIRTABLE_BASE_ID"
            exit 1
          fi

          if [ -z "${AIRTABLE_API_KEY}" ]; then
            echo "Missing required secret: AIRTABLE_API_KEY"
            exit 1
          fi

          if [ -z "${MURAL_CLIENT_SECRET}" ]; then
            echo "Missing required secret: MURAL_CLIENT_SECRET"
            exit 1
          fi

      - name: Build preview secrets file
        env:
          RESEARCHOPS_AUTH_SECRET: ${{ secrets.RESEARCHOPS_AUTH_SECRET }}
          RESEARCHOPS_EMAIL_WEBHOOK_URL: ${{ secrets.RESEARCHOPS_EMAIL_WEBHOOK_URL }}
          RESEARCHOPS_EMAIL_WEBHOOK_TOKEN: ${{ secrets.RESEARCHOPS_EMAIL_WEBHOOK_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEARCHOPS_EMAIL_FROM: ${{ secrets.RESEARCHOPS_EMAIL_FROM }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          MURAL_CLIENT_SECRET: ${{ secrets.MURAL_CLIENT_SECRET }}
        run: |
          python - <<'PY'
          import json
          import os

          keys = [
              "RESEARCHOPS_AUTH_SECRET",
              "RESEARCHOPS_EMAIL_WEBHOOK_URL",
              "RESEARCHOPS_EMAIL_WEBHOOK_TOKEN",
              "RESEND_API_KEY",
              "RESEARCHOPS_EMAIL_FROM",
              "AIRTABLE_BASE_ID",
              "AIRTABLE_API_KEY",
              "MURAL_CLIENT_SECRET",
          ]
          data = {key: os.environ[key] for key in keys if os.environ.get(key)}
          with open(".passwordless-preview.secrets.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle)
          PY

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Apply preview project seed migration to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${PREVIEW_PROJECT_SEED_MIGRATION}"

      - name: Apply passwordless migration to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${PASSWORDLESS_MIGRATION}"

      - name: Deploy preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} deploy \
            --config "${WRANGLER_CONFIG}"

      - name: Upload preview Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} secret bulk .passwordless-preview.secrets.json \
            --config "${WRANGLER_CONFIG}"

      - name: Verify preview Worker passwordless route responds
        run: |
          node --input-type=module <<'NODE'
          const response = await fetch('https://rops-api-passwordless-preview.digikev-kevin-rapley.workers.dev/api/me', {
            headers: { accept: 'application/json' },
          });
          if (![401, 403].includes(response.status)) {
            console.error(`Expected unauthenticated /api/me to return 401 or 403, got ${response.status}`);
            process.exit(1);
          }
          NODE