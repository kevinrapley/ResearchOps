name: Bootstrap D1 Auth Runtime

on:
  workflow_dispatch:
    inputs:
      confirm_database_name:
        description: Type researchops-d1 to confirm the target D1 database
        required: true
        type: string
      confirm_operation:
        description: Type BOOTSTRAP_AUTH_RUNTIME to seed the first runtime admin
        required: true
        type: string
      admin_email:
        description: Cloudflare Access email address for the first team admin
        required: true
        type: string
      admin_display_name:
        description: Display name for the first team admin
        required: true
        type: string
      team_id:
        description: Stable team ID to create or use
        required: true
        default: team_researchops_core
        type: string
      team_name:
        description: Team name to create or update
        required: true
        default: ResearchOps Core Team
        type: string
      assign_safeguarding_lead:
        description: Also assign safeguarding_lead to the admin user
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WRANGLER_VERSION: "4.34.0"
  D1_DATABASE_NAME: "researchops-d1"
  WRANGLER_CONFIG: "infra/cloudflare/wrangler.toml"
  BOOTSTRAP_SQL: "auth-runtime-bootstrap.sql"
  VERIFY_SQL: "auth-runtime-bootstrap-verify.sql"

jobs:
  bootstrap:
    name: Bootstrap authentication runtime in remote D1
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Confirm requested target
        run: |
          if [ "${{ inputs.confirm_database_name }}" != "${D1_DATABASE_NAME}" ]; then
            echo "confirm_database_name must be ${D1_DATABASE_NAME}"
            exit 1
          fi

          if [ "${{ inputs.confirm_operation }}" != "BOOTSTRAP_AUTH_RUNTIME" ]; then
            echo "confirm_operation must be BOOTSTRAP_AUTH_RUNTIME"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate bootstrap SQL
        env:
          ADMIN_EMAIL: ${{ inputs.admin_email }}
          ADMIN_DISPLAY_NAME: ${{ inputs.admin_display_name }}
          TEAM_ID: ${{ inputs.team_id }}
          TEAM_NAME: ${{ inputs.team_name }}
          ASSIGN_SAFEGUARDING_LEAD: ${{ inputs.assign_safeguarding_lead }}
        run: node scripts/auth-runtime-bootstrap.mjs

      - name: Record Wrangler toolchain version
        run: npx --yes wrangler@${WRANGLER_VERSION} --version

      - name: Apply auth runtime bootstrap to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${BOOTSTRAP_SQL}"

      - name: Verify bootstrap user, membership and roles
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${WRANGLER_VERSION} d1 execute "${D1_DATABASE_NAME}" \
            --remote \
            --config "${WRANGLER_CONFIG}" \
            --file "${VERIFY_SQL}"
