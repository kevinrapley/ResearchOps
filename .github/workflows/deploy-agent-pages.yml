name: Build agent documentation Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.agent-operating-model/bundles/github/**'
      - 'docs/agent-operating-model/**'
      - 'scripts/agent-operating-model/**'
      - 'build.sh'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-agent-pages.yml'
  pull_request:
    paths:
      - '.agent-operating-model/bundles/github/**'
      - 'docs/agent-operating-model/**'
      - 'scripts/agent-operating-model/**'
      - 'build.sh'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-agent-pages.yml'

permissions:
  contents: read
  deployments: write

concurrency:
  group: agent-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build agent documentation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build agent documentation
        run: bash build.sh

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy docs/agent-operating-model --project-name=agent-rops --branch=${{ github.ref_name }}
