name: QA — Broken links (Lychee)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated pages and assets
        run: npm run build

      - name: Check links in repo
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml .
          token: ${{ secrets.GITHUB_TOKEN }}
