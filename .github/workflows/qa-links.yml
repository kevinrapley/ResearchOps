name: QA — Broken links (Lychee)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check links in repo
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml .
          token: ${{ secrets.GITHUB_TOKEN }}
