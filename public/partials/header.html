<section class="govuk-service-navigation" data-module="govuk-service-navigation" aria-label="Service information" data-active="{{active}}">
	<div class="govuk-width-container">
		<div class="govuk-service-navigation__container">
			<nav aria-label="Menu" class="govuk-service-navigation__wrapper">
				<button type="button" class="govuk-service-navigation__toggle govuk-js-service-navigation-toggle" aria-controls="navigation" hidden aria-hidden="true">
					Menu
				</button>
				<ul class="govuk-service-navigation__list" id="navigation">
					<li class="govuk-service-navigation__item">
						<a class="govuk-service-navigation__link" href="/" data-nav="Home">Home</a>
					</li>
					<li class="govuk-service-navigation__item">
						<a class="govuk-service-navigation__link" href="/pages/start/overview/" data-nav="Start Research Project">Start research project</a>
					</li>
					<li class="govuk-service-navigation__item">
						<a class="govuk-service-navigation__link" href="/pages/projects/" data-nav="Projects">Projects</a>
					</li>
				</ul>
			</nav>
		</div>
	</div>
</section>

<div class="govuk-phase-banner govuk-width-container" role="note" aria-label="Service phase">
	<p class="govuk-phase-banner__content">
		<strong class="govuk-tag govuk-phase-banner__content__tag">Prototype</strong>
		<span class="govuk-phase-banner__text">This is a ResearchOps prototype. Do not enter real participant personal data.</span>
	</p>
</div>

<script>
	function ensurePageChromeStylesheet() {
		const stylesheets = [
			"/css/govuk/govuk-header-service-brand.css",
			"/css/govuk/govuk-main-content-focus.css",
		];

		for (const href of stylesheets) {
			if (document.querySelector(`link[href="${href}"]`)) continue;
			const link = document.createElement("link");
			link.rel = "stylesheet";
			link.href = href;
			link.media = "screen";
			document.head.appendChild(link);
		}
	}

	function ensureMainContentTarget() {
		const main = document.querySelector("main");
		if (!main) return;
		main.classList.add("govuk-main-wrapper");
		const target = main;
		if (!target.id) target.id = "main-content";
	}

	function initServiceNavigation() {
		document.querySelectorAll("[data-active]").forEach((container) => {
			const active = (container.getAttribute("data-active") || "").trim();
			container.querySelectorAll("[data-nav]").forEach((link) => {
				const isActive = active && link.getAttribute("data-nav") === active;
				const item = link.closest(".govuk-service-navigation__item");
				if (item) item.classList.toggle("govuk-service-navigation__item--active", Boolean(isActive));
				if (isActive) link.setAttribute("aria-current", "true");
				else link.removeAttribute("aria-current");
			});
		});
	}

	ensurePageChromeStylesheet();
	ensureMainContentTarget();
	initServiceNavigation();
</script>
