<!doctype html>
<html class="govuk-template" lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Search - ResearchOps Demo Suite</title>
		<link rel="stylesheet" href="/assets/govuk/govuk-frontend.css" media="screen" />
		<link rel="stylesheet" href="/css/researchops-fonts.css" media="screen" />

		<link rel="stylesheet" href="/css/search.css" media="screen" />
		<link rel="modulepreload" href="/js/search-page.js" />

		<script type="module" src="/components/layout.js?v=govuk-page-chrome-20260702-1" defer></script>
		<script type="module" src="/js/govuk-frontend-init.js?v=govuk-page-chrome-20260702-1" defer></script>
		<script type="module" src="/js/flux-researchops-tracker.1.2.0.js" defer></script>
	</head>
	<body class="govuk-template__body">
		<script>
			document.body.className +=
				" js-enabled" + ("noModule" in HTMLScriptElement.prototype ? " govuk-frontend-supported" : "");
		</script>
		<x-include src="/partials/header.html" vars='{"active":"Research Repository"}'></x-include>
		<main class="govuk-main-wrapper" id="main-content" role="main" tabindex="-1">
			<div class="govuk-width-container researchops-utility-page researchops-search-page">
				<nav class="govuk-breadcrumbs" aria-label="Breadcrumb">
					<ol class="govuk-breadcrumbs__list">
						<li class="govuk-breadcrumbs__list-item">
							<a class="govuk-breadcrumbs__link" href="/">Home</a>
						</li>

						<li class="govuk-breadcrumbs__list-item" aria-current="page">Search</li>
					</ol>
				</nav>

				<header class="researchops-utility-page__intro">
					<div class="govuk-grid-row">
						<div class="govuk-grid-column-two-thirds">
							<h1 class="govuk-heading-xl">Search</h1>
							<p class="govuk-body-l">Search locally saved ResearchOps records.</p>
							<p class="govuk-body">
								Use this page to find sessions, consent records, notes, tags, clusters and themes stored in this
								browser.
							</p>
						</div>
					</div>
				</header>

				<section class="researchops-utility-page__section" aria-labelledby="search-query-title">
					<div class="govuk-grid-row">
						<div class="govuk-grid-column-two-thirds">
							<h2 class="govuk-heading-l" id="search-query-title">Search records</h2>
							<form id="search-form" class="researchops-utility-page__form" novalidate>
								<div class="researchops-utility-page__form-row">
									<div class="govuk-form-group">
										<label class="govuk-label" for="q">Search text</label>

										<div id="q-hint" class="govuk-hint">For example, contrast or navigation.</div>

										<input
											class="govuk-input govuk-!-width-full"
											id="q"
											name="q"
											type="text"
											aria-describedby="q-hint"
											autocomplete="off"
										/>
									</div>

									<div class="govuk-form-group">
										<label class="govuk-label" for="type">Type</label>

										<select class="govuk-select" id="type" name="type">
											<option value="">Any</option>

											<option value="ResearchSession">Research session</option>

											<option value="Consent">Consent</option>

											<option value="Note">Note</option>

											<option value="Tag">Tag</option>

											<option value="Cluster">Cluster</option>

											<option value="Theme">Theme</option>
										</select>
									</div>
								</div>

								<div class="govuk-button-group">
									<button type="button" class="govuk-button" data-module="govuk-button" id="go">Search</button>
								</div>
							</form>
						</div>
					</div>
				</section>

				<section
					id="search-results-section"
					class="researchops-utility-page__section researchops-utility-page__section--secondary"
					aria-labelledby="search-results-title"
					hidden
				>
					<h2 class="govuk-heading-l" id="search-results-title">Results</h2>
					<div id="results" class="researchops-utility-page__results search-results" aria-live="polite"></div>
				</section>
			</div>
		</main>
		<x-include src="/partials/footer.html?v=govuk-page-chrome-20260702-1"></x-include>

		<script type="module" src="/js/search-page.js"></script>
	</body>
</html>
