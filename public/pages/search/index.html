<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Search — ResearchOps</title>

	<link rel="stylesheet" href="/css/govuk/govuk-typography.css" media="screen" />
	<link rel="stylesheet" href="/css/govuk/govuk-colours.css" media="screen" />
	<link rel="stylesheet" href="/css/screen.css" media="screen" />
	<link rel="stylesheet" href="/css/govuk/govuk-buttons.css" media="screen" />
	<link rel="stylesheet" href="/css/govuk/govuk-forms.css" media="screen" />
	<link rel="stylesheet" href="/css/search.css" media="screen" />
	<link rel="modulepreload" href="/js/search-page.js" />
	<script type="module" src="/components/layout.js" defer></script>
</head>

<body>
	<x-include src="/partials/debug-boot.html" debug-only></x-include>
	<x-include src="/partials/header.html" vars='{
			"active":"Search",
			"subtitle":"Search"
		}'>
	</x-include>

	<div class="card search-panel">
		<h2 class="govuk-heading-m">Query</h2>
		<div class="search-controls">
			<div class="govuk-form-group">
				<label class="govuk-label" for="q">Search text</label>
				<input id="q" class="govuk-input" placeholder="Search text (e.g., contrast, navigation)" />
			</div>
			<div class="govuk-form-group">
				<label class="govuk-label search-type-label" for="type">Type</label>
				<select id="type" class="govuk-select">
					<option value="">Any</option>
					<option>ResearchSession</option>
					<option>Consent</option>
					<option>Note</option>
					<option>Tag</option>
					<option>Cluster</option>
					<option>Theme</option>
				</select>
			</div>
			<div class="govuk-button-group">
				<button id="go" class="govuk-button">Search</button>
			</div>
		</div>
	</div>

	<div class="card search-panel">
		<h2 class="govuk-heading-m">Results</h2>
		<div id="results" class="search-results"></div>
	</div>

	<x-include src="/partials/footer.html"></x-include>

	<script type="module" src="/js/search-page.js"></script>
</body>

</html>
