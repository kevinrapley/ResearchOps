bundle_id: mural-public-api-developer-contract-bundle
bundle_version: 3.4.0
bundle_kind: hybrid-agent-bundle
bundle_purpose: Provide endpoint-accurate, contract-rich development guidance for the full public Mural API surface, including method-path mappings, scopes, parameters, request bodies, response contracts, and multilingual request examples.
canonical_formats:
  prompt_modules: xml
  configuration: yaml
  contracts: json-schema
  compatibility_exports:
  - js-esm
required_top_level_assets:
- registry-manifest.yaml
- CHANGELOG.md
- evals.yaml
- grade.schema.json
- grade.schema.js
- output.schema.json
- output.schema.js
- prompt.body.xml
- prompt.spec.yaml
- tests.redteam.yaml
- tests.regression.yaml
- topology.plan.xml
- topology.schema.json
- generated-bundle-manifest.schema.json
- variables.schema.json
- endpoint-coverage.matrix.yaml
- endpoint-source.catalog.yaml
- scopes.matrix.yaml
- templates/
- references/
- graders/
- contracts/
- contracts/endpoint-contract.schema.json
- contracts/endpoint-contracts.index.yaml
selected_conditional_module_folders:
- folder: workflows
  justification: The agent must resolve requests from resource-family classification through endpoint selection, scope design, orchestration, and hardening.
- folder: patterns
  justification: The public Mural API has recurring integration shapes such as provisioning, search, facilitation runtime, export, and widget automation.
- folder: domains
  justification: The API surface is wide enough that object families need their own semantic modules instead of one monolithic board-automation module.
operating_scope:
  include_capabilities:
  - OAuth 2.0 authorization code flow
  - PKCE
  - scope selection
  - workspaces
  - rooms
  - folders
  - murals
  - mural sharing
  - exports
  - assets
  - users
  - templates
  - search
  - chat
  - tags
  - private mode
  - voting sessions
  - timers
  - widget inventory
  - widget subtype CRUD
  - comments
  - pagination
  - rate-limit-aware design
  - error handling
  exclude_topics:
  - Mural enterprise API
  - SCIM provisioning
  - audit logs
  - reports
  - eDiscovery
  - Canvas Embed SDK as a substitute for public API endpoint coverage
  - anonymous visitor authentication through an external app
  - invented AI capabilities
authoring_rules:
- Ground capability claims in the published Mural public API docs and reference pages.
- Use the endpoint coverage matrix before inferring method-path pairings.
- Prefer explicit endpoint names and object layers over generic collaboration prose.
- Treat user-supplied reference links as first-class provenance, not as optional hints.
- Make least-privilege scope selection explicit for every recommended flow.
- State pagination, next-token, rate-limit, token refresh, and error posture when list or bulk flows are involved.
response_requirements:
- Translate the request into exact endpoint families and object layers.
- Return method-path candidates with rationale and provenance.
- For every recommended endpoint, include the contract file path and summarize path params, query params, request body, scopes, success statuses, error statuses, and example language coverage.
- Provide scope strategy, architecture, orchestration order, operational controls, trade-offs, and risks.
- Flag when a request crosses into enterprise-only or visitor-auth-impossible territory.
quality_gates:
  hard_fail_if:
  - any user-supplied reference endpoint is missing from the endpoint inventory
  - public API coverage is collapsed to category-only prose when endpoint-level reasoning is needed
  - enterprise-only capabilities are presented as public API capabilities
  - visitors are described as authenticating through the external app
  - required governance or schema assets are missing
  - recommended endpoints do not map to a concrete endpoint contract file with params, response statuses, and code examples
  - updatemuralmemberpermissions body shape is described with userId in the body (it is a path parameter in this operation)
  revise_if:
  - scope minimization is absent
  - pagination or rate limits are ignored in list-heavy flows
  - facilitation runtime is treated as equivalent to generic widget CRUD
  - tests do not cover auth, hierarchy, murals, access, export, collaboration runtime, widgets, templates, search, and boundaries
  - response body shape is surfaced from $ref rather than body_shape_inline when detail is requested
  - inline_error_envelope is not used when error schema detail is requested
  - code examples are presented without path-parameter variable declarations
