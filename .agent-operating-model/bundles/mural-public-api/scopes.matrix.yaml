bundle: mural-public-api-developer-contract-bundle
scope_model_source: https://developers.mural.co/public/docs/scopes
principles:
- Use the minimum read scopes needed for discovery and lookup flows.
- Escalate to write scopes only for creation, mutation, invitation, deletion, sharing updates, facilitation controls, or widget changes.
- identity:read is needed for /users/me.
- rooms:write covers room CRUD, room membership changes, and room folder changes.
- murals:write covers mural mutation, visitor settings, assets, facilitation controls, tags, comments, and widget CRUD.
- templates:write covers custom template creation and template deletion.
- workspaces:write covers workspace-level membership invitations (inviteuserstoworkspace).
  Not listed on the Mural public scopes overview page — that page predates the
  inviteuserstoworkspace endpoint — but is authoritative per the endpoint's reference page.
scopes:
  read:
    rooms:read: Retrieve room information and room settings.
    users:read: Retrieve collaborator information for rooms and murals.
    workspaces:read: Retrieve workspace information and workspace settings.
    murals:read: Retrieve mural information, exports, users, chat, tags, timers, voting, and widgets.
    identity:read: Retrieve the current user's identity details.
    templates:read: Retrieve default, workspace, recent, and searchable templates.
  write:
    rooms:write: Create, update, delete rooms, and manage room membership and folders.
    murals:write: Create and update murals, manage sharing, create assets, control facilitation runtime, and manage widgets.
    templates:write: Create custom templates from murals and delete templates.
    workspaces:write: Invite members and guests to a workspace. Required by inviteuserstoworkspace.
      Caller must be a workspace admin.
operation_scope_examples:
- operation: getworkspaces
  minimum_scopes:
  - workspaces:read
- operation: createroom
  minimum_scopes:
  - rooms:write
- operation: createmural
  minimum_scopes:
  - murals:write
- operation: getmuralusers
  minimum_scopes:
  - murals:read
  - users:read
- operation: createmuralfromtemplate
  minimum_scopes:
  - murals:write
  - templates:read
- operation: searchmurals
  minimum_scopes:
  - workspaces:read
  - murals:read
- operation: createcomment
  minimum_scopes:
  - murals:write
- operation: startprivatemode
  minimum_scopes:
  - murals:write
- operation: inviteuserstoworkspace
  minimum_scopes:
  - workspaces:write
- operation: updatemuralmemberpermissions
  minimum_scopes:
  - murals:write
- operation: removemuralusers
  minimum_scopes:
  - murals:write
