bundle: mural-public-api-developer-contract-bundle
version: 3.4.0
guarantee:
  mode: spec-driven
  statement: Every published endpoint supplied by the user is represented explicitly. Additional public API functions for Users, Rooms, Templates, Workspaces, and Search are represented as first-class inventory entries. As of 3.1.0 the Users-family endpoints `inviteuserstoworkspace`, `updatemuralmemberpermissions`, and `removemuralusers` (all promoted out of preview in the 2022-08-29 changelog) are explicitly inventoried.
aliases:
- supplied: updatetetextbox
  canonical: updatetextbox
  reason: Bundle normalizes the supplied page slug to the canonical operation name while preserving the supplied URL provenance.
families:
- family: authentication
  operations:
  - family: authentication
    name: oauth_authorize
    method: GET
    path: /authorization/oauth2/
    source_url: https://developers.mural.co/public/docs/oauth
    source_status: official-reference-page
    layer: auth
    notes: null
    scopes: []
  - family: authentication
    name: oauth_token
    method: POST
    path: /authorization/oauth2/token
    source_url: https://developers.mural.co/public/docs/oauth
    source_status: official-reference-page
    layer: auth
    notes: null
    scopes: []
