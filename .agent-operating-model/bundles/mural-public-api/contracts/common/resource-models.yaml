      type: string
    widgetId:
      type: string
    createdOn:
      type: string
      format: date-time
    updatedOn:
      type: string
      format: date-time
  additionalProperties: true
asset:
  type: object
  properties:
    id:
      type: string
    url:
      type: string
      format: uri
