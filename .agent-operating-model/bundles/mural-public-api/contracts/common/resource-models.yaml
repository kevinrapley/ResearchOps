export:
  type: object
  properties:
    id:
      type: string
    status:
      type: string
    url:
      type: string
      format: uri
    createdOn:
      type: string
      format: date-time
  additionalProperties: true
accessInfo:
  type: object
  properties:
    authorized:
      type: boolean
    reason:
      type: string
    permissions:
      type: array
      items:
        type: string
  additionalProperties: true
