workspace:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    name:
      type: string
    title:
      type: string
    description:
      type: string
    createdOn:
      type: string
      format: date-time
    updatedOn:
      type: string
      format: date-time
  additionalProperties: true
room:
  type: object
  required:
  - id
  properties:
    id:
      type:
      - integer
      - string
    name:
      type: string
    title:
      type: string
    workspaceId:
      type: string
    privacy:
      type: string
    createdOn:
      type: string
      format: date-time
    updatedOn:
      type: string
      format: date-time
  additionalProperties: true
folder:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    name:
      type: string
    title:
      type: string
    roomId:
      type:
      - integer
      - string
  additionalProperties: true
mural:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    title:
      type: string
    roomId:
      type:
      - integer
      - string
    folderId:
      type: string
    width:
      type: number
    height:
      type: number
    infinite:
      type: boolean
    backgroundColor:
      type: string
    status:
      type: string
    favorite:
      type: boolean
    workspaceMembersPermission:
      type: string
    visitorsPermission:
      type: string
    timerSoundTheme:
      type: string
    visitorAvatarTheme:
      type: string
