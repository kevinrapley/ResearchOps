      type: string
      format: date-time
    updatedOn:
      type: string
      format: date-time
  additionalProperties: true
user:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    name:
      type: string
    email:
      type: string
    avatarUrl:
      type: string
      format: uri
    role:
      type: string
    type:
      type: string
    permission:
      type: string
  additionalProperties: true
template:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    title:
      type: string
    name:
      type: string
    description:
      type: string
    workspaceId:
      type: string
    category:
      type: string
  additionalProperties: true
tag:
  type: object
  required:
  - id
  - text
  - backgroundColor
  - borderColor
  - color
  properties:
    id:
      type: string
    text:
      type: string
    backgroundColor:
      type: string
    borderColor:
      type: string
    color:
      type: string
    widgets:
      type: array
      items:
        type: object
        additionalProperties: true
  additionalProperties: true
chatMessage:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    text:
      type: string
    createdOn:
      type: string
      format: date-time
    updatedOn:
      type: string
      format: date-time
    userId:
      type: string
  additionalProperties: true
privateMode:
  type: object
  properties:
    active:
      type: boolean
    startedOn:
      type: string
      format: date-time
    endedOn:
      type: string
      format: date-time
  additionalProperties: true
votingSession:
  type: object
  required:
  - id
  properties:
    id:
      type: string
    status:
      type: string
    title:
      type: string
    startedOn:
      type: string
      format: date-time
    endedOn:
      type: string
      format: date-time
    maxVotesPerUser:
      type: integer
  additionalProperties: true
timer:
  type: object
