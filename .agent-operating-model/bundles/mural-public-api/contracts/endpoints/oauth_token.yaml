operation_id: oauth_token
summary: Exchange authorization code for tokens.
family: authentication
layer: auth
method: POST
url_template: https://app.mural.co/api/public/{version}/authorization/oauth2/token
path_template: /authorization/oauth2/token
reference:
  source_url: https://developers.mural.co/public/docs/oauth
  source_status: official-reference-page
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: '{version}'
  default_version: v1
  versioning_note: Mural public API uses major-version path versioning.
auth:
  scheme: OAuth 2.0 Bearer
  oauth_flow: authorization_code
  pkce_supported: true
authorization:
  minimum_scopes: []
  scope_resolution_rule: Request the smallest set of scopes that satisfies the operation.
parameters:
  path: []
  query: []
request_body:
  present: true
  content_type: application/x-www-form-urlencoded
  schema:
    type: object
    properties:
      grant_type:
        type: string
        example: authorization_code
      code:
        type: string
      redirect_uri:
        type: string
      code_verifier:
        type: string
      client_id:
        type: string
      client_secret:
        type: string
    required:
    - grant_type
    - code
    - redirect_uri
    - client_id
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape:
      type: object
      required:
      - access_token
      - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
      additionalProperties: true
    body_shape_inline:
      type: object
      required:
      - access_token
      - token_type
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        scope:
          type: string
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: No authorization or token expired.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Access denied, invalid scope, or unsupported zone.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: The requested resource was not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '500':
    description: API error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
code_examples:
  node: "const baseUrl = `https://app.mural.co/api/public/${process.env.MURAL_API_VERSION || 'v1'}`;\nconst accessToken = process.env.MURAL_ACCESS_TOKEN;\n\nconst response = await fetch(`${baseUrl}/authorization/oauth2/token`, {\n  method: 'POST',\n  headers: {\n    Authorization: `Bearer ${accessToken}`,\n    Accept: 'application/json',\n    'Content-Type': 'application/x-www-form-urlencoded',\n  },\n  body: new URLSearchParams({\n  \"grant_type\": \"authorization_code\",\n  \"code\": \"AUTHORIZATION_CODE\",\n  \"redirect_uri\": \"https://your-app.example.com/oauth/callback\",\n  \"code_verifier\": \"YOUR_CODE_VERIFIER\",\n  \"client_id\": \"YOUR_CLIENT_ID\",\n  \"client_secret\": \"YOUR_CLIENT_SECRET\"\n}),\n});\nconst data = response.status === 204 ? null : await response.json();\nconsole.log(response.status, data);"
  ruby: "require 'net/http'\nrequire 'json'\nrequire 'uri'\n\nbase_url = \"https://app.mural.co/api/public/#{ENV.fetch('MURAL_API_VERSION', 'v1')}\"\n\nuri = URI(base_url + \"/authorization/oauth2/token\")\nrequest = Net::HTTP::Post.new(uri)\nrequest.initialize_http_header({\n  'Authorization' => \"Bearer #{ENV.fetch('MURAL_ACCESS_TOKEN')}\",\n  'Accept' => 'application/json',\n  'Content-Type' => 'application/x-www-form-urlencoded',\n})\nrequest.set_form_data({\n  \"grant_type\": \"authorization_code\",\n  \"code\": \"AUTHORIZATION_CODE\",\n  \"redirect_uri\": \"https://your-app.example.com/oauth/callback\",\n  \"code_verifier\": \"YOUR_CODE_VERIFIER\",\n  \"client_id\": \"YOUR_CLIENT_ID\",\n  \"client_secret\": \"YOUR_CLIENT_SECRET\"\n})\n\nresponse = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }\ndata = response.code == '204' ? nil : JSON.parse(response.body)\nputs [response.code, data].inspect"
  php: "<?php\n\n$baseUrl = 'https://app.mural.co/api/public/' . (getenv('MURAL_API_VERSION') ?: 'v1');\n$ch = curl_init($baseUrl . '/authorization/oauth2/token');\n$options = [\n    CURLOPT_CUSTOMREQUEST => 'POST',\n    CURLOPT_RETURNTRANSFER => true,\n    CURLOPT_HTTPHEADER => [\n        \"Authorization: Bearer \" . getenv('MURAL_ACCESS_TOKEN'),\n        \"Accept: application/json\",\n        \"Content-Type: application/x-www-form-urlencoded\"\n    ],\n];\n$payload = [\n    \"grant_type\" => \"authorization_code\",\n    \"code\" => \"AUTHORIZATION_CODE\",\n    \"redirect_uri\" => \"https://your-app.example.com/oauth/callback\",\n    \"code_verifier\" => \"YOUR_CODE_VERIFIER\",\n    \"client_id\" => \"YOUR_CLIENT_ID\",\n    \"client_secret\" => \"YOUR_CLIENT_SECRET\"\n];\n$options[CURLOPT_POSTFIELDS] = http_build_query($payload);\ncurl_setopt_array($ch, $options);\n$body = curl_exec($ch);\n$status = curl_getinfo($ch, CURLINFO_HTTP_CODE);\ncurl_close($ch);\n\n$data = $status === 204 ? null\
    \ : json_decode($body, true);\nvar_dump($status, $data);"
  python: "import os\nimport requests\n\nbase_url = f\"https://app.mural.co/api/public/{os.getenv('MURAL_API_VERSION', 'v1')}\"\nheaders = {\n    'Authorization': f\"Bearer {os.environ['MURAL_ACCESS_TOKEN']}\",\n    'Accept': 'application/json',\n    'Content-Type': 'application/x-www-form-urlencoded',\n}\n\nresponse = requests.request(\n    'POST',\n    f\"{base_url}/authorization/oauth2/token\",\n    headers=headers,\n    data={\n    \"grant_type\": \"authorization_code\",\n    \"code\": \"AUTHORIZATION_CODE\",\n    \"redirect_uri\": \"https://your-app.example.com/oauth/callback\",\n    \"code_verifier\": \"YOUR_CODE_VERIFIER\",\n    \"client_id\": \"YOUR_CLIENT_ID\",\n    \"client_secret\": \"YOUR_CLIENT_SECRET\"\n},\n)\ndata = None if response.status_code == 204 else response.json()\nprint(response.status_code, data)"
contract_strength:
  method_and_path: reference-verified
  status_codes: reference-verified
  params: reference-verified
  success_shape: endpoint-specific; OAuth token response (reference-verified fields)
  error_shape: docs-verified for code/message, bundle-extended for optional details[]
development_notes:
- 'Use Accept: application/json on all API requests.'
- 'Use Authorization: Bearer <access_token> for authenticated requests.'
- Honor rate limiting and retry with backoff on 429 responses.
- Store the access_token and refresh_token securely; do not log them.
- Access tokens expire. Use the refresh_token flow before retrying a 401.
- 'PKCE: include code_verifier in the token exchange request when PKCE was used in the authorize step.'
inline_error_envelope:
  type: object
  properties:
    code:
      type: string
    message:
      type: string
    details:
      type: array
      items:
        type: object
        properties:
          code:
            type: string
          message:
            type: string
contract_version: 3.4.0
