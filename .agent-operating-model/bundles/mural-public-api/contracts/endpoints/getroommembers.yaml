operation_id: getroommembers
summary: List room members.
family: rooms
layer: room-membership
method: GET
url_template: https://app.mural.co/api/public/{version}/rooms/{roomId}/users
path_template: /rooms/{roomId}/users
reference:
  source_url: https://developers.mural.co/public/reference/getroommembers
  source_status: official-reference-page
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: '{version}'
  default_version: v1
  versioning_note: Mural public API uses major-version path versioning.
auth:
  scheme: OAuth 2.0 Bearer
  oauth_flow: authorization_code
  pkce_supported: true
authorization:
  minimum_scopes:
  - users:read
  - rooms:read
  scope_resolution_rule: Request the smallest set of scopes that satisfies the operation.
parameters:
  path:
  - name: roomId
    in: path
    required: true
    type: integer
  query:
  - name: limit
    type: integer
  - name: next
    type: string
request_body:
  present: false
  content_type: null
  schema: null
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape:
      type: object
      required:
      - value
      properties:
        value:
          type: array
          items:
            $ref: ../common/resource-models.yaml#/user
        next:
          type: string
      additionalProperties: true
    body_shape_inline:
      type: object
      required:
      - value
      properties:
        value:
          type: array
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: string
              name:
                type: string
              email:
                type: string
              avatarUrl:
                type: string
                format: uri
              role:
                type: string
              type:
                type: string
              permission:
                type: string
            additionalProperties: true
        next:
          type: string
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: No authorization or token expired.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Access denied, invalid scope, or unsupported zone.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: The requested resource was not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Too Many Requests.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: API error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
code_examples:
  node: "const baseUrl = `https://app.mural.co/api/public/${process.env.MURAL_API_VERSION || 'v1'}`;\nconst accessToken = process.env.MURAL_ACCESS_TOKEN;\nconst roomId = process.env.ROOM_ID || 'YOUR_ROOM_ID';\nconst response = await fetch(`${baseUrl}/rooms/${roomId}/users?limit=50&next=NEXT_TOKEN`, {\n  method: 'GET',\n  headers: {\n    Authorization: `Bearer ${accessToken}`,\n    Accept: 'application/json',\n  },\n});\nconst data = response.status === 204 ? null : await response.json();\nconsole.log(response.status, data);"
  ruby: "require 'net/http'\nrequire 'json'\nrequire 'uri'\n\nbase_url = \"https://app.mural.co/api/public/#{ENV.fetch('MURAL_API_VERSION', 'v1')}\"\nroom_id = ENV.fetch('ROOM_ID', 'YOUR_ROOM_ID')\nuri = URI(base_url + \"/rooms/#{room_id}/users?limit=50&next=NEXT_TOKEN\")\nrequest = Net::HTTP::Get.new(uri)\nrequest.initialize_http_header({\n  'Authorization' => \"Bearer #{ENV.fetch('MURAL_ACCESS_TOKEN')}\",\n  'Accept' => 'application/json',\n})\n\nresponse = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }\ndata = response.code == '204' ? nil : JSON.parse(response.body)\nputs [response.code, data].inspect"
  php: "<?php\n$roomId = getenv('ROOM_ID') ?: 'YOUR_ROOM_ID';\n$baseUrl = 'https://app.mural.co/api/public/' . (getenv('MURAL_API_VERSION') ?: 'v1');\n$ch = curl_init($baseUrl . '/rooms/' . $roomId . '/users?limit=50&next=NEXT_TOKEN');\n$options = [\n    CURLOPT_CUSTOMREQUEST => 'GET',\n    CURLOPT_RETURNTRANSFER => true,\n    CURLOPT_HTTPHEADER => [\n        \"Authorization: Bearer \" . getenv('MURAL_ACCESS_TOKEN'),\n        \"Accept: application/json\"\n    ],\n];\ncurl_setopt_array($ch, $options);\n$body = curl_exec($ch);\n$status = curl_getinfo($ch, CURLINFO_HTTP_CODE);\ncurl_close($ch);\n\n$data = $status === 204 ? null : json_decode($body, true);\nvar_dump($status, $data);"
  python: "import os\nimport requests\n\nroomId = os.environ.get('ROOM_ID', 'YOUR_ROOM_ID')\n\nbase_url = f\"https://app.mural.co/api/public/{os.getenv('MURAL_API_VERSION', 'v1')}\"\nheaders = {\n    'Authorization': f\"Bearer {os.environ['MURAL_ACCESS_TOKEN']}\",\n    'Accept': 'application/json',\n}\n\nresponse = requests.request(\n    'GET',\n    f\"{base_url}/rooms/{roomId}/users?limit=50&next=NEXT_TOKEN\",\n    headers=headers,\n)\ndata = None if response.status_code == 204 else response.json()\nprint(response.status_code, data)"
contract_strength:
  method_and_path: reference-verified
  status_codes: reference-verified
  params: reference-verified
  success_shape: endpoint-specific-paginated; value=array-of-user, next=cursor; inlined schema
  error_shape: docs-verified for code/message, bundle-extended for optional details[]
development_notes:
- 'Use Accept: application/json on all API requests.'
- 'Use Authorization: Bearer <access_token> for authenticated requests.'
- Honor rate limiting and retry with backoff on 429 responses.
- Returns all members explicitly invited to the room. Does not include workspace-level members unless they were also room-invited.
inline_error_envelope:
  type: object
  properties:
    code:
      type: string
    message:
      type: string
    details:
      type: array
      items:
        type: object
        properties:
          code:
            type: string
          message:
            type: string
contract_version: 3.4.0
