bundle: mural-public-api-developer-contract-bundle
version: 3.4.0
official_docs_pages:
- name: getting_started
  url: https://developers.mural.co/public/docs/getting-started
  purpose: Onboarding page that links to the public API, app registration, and the Mural OpenAPI spec.
- name: oauth
  url: https://developers.mural.co/public/docs/oauth
  purpose: OAuth 2.0 authorization code flow, token exchange, refresh, and PKCE.
- name: scopes
  url: https://developers.mural.co/public/docs/scopes
  purpose: Read and write scope model and app scope change behavior.
- name: rate_limiting
  url: https://developers.mural.co/public/docs/rate-limiting
  purpose: Parallel per-user and per-app limits plus response headers.
- name: error_codes
  url: https://developers.mural.co/public/docs/error-codes
  purpose: HTTP error model and error payload handling.
- name: mural_basics
  url: https://developers.mural.co/public/docs/mural-basics
  purpose: Hierarchy, collaborator types, and visitor boundary.
- name: public_vs_enterprise
  url: https://developers.mural.co/public/docs/public-vs-enterprise
  purpose: Boundary between public Mural API and enterprise API.
- name: app_credentials
  url: https://developers.mural.co/public/docs/app-credentials
  purpose: Client ID and client secret handling.
- name: basic_information_page
  url: https://developers.mural.co/public/docs/basic-information-page
  purpose: App scope allowlist and additional redirect URLs.
