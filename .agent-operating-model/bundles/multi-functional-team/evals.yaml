evaluation_system:
  name: self-contained XML grader orchestration
  grade_schema: grade.schema.json
  output_schema: output.schema.json
pipelines:
- id: default-response-pipeline
  uses_prompt: prompt.body.xml
  uses_variables: variables.schema.json
  uses_graders:
  - graders/agent-behaviour.xml
  - graders/role-behaviour.xml
  revision_policy: revise once on fail_revise; escalate or refuse on fail_escalate
- id: developer-response-pipeline
  uses_prompt: prompt.body.xml
  uses_graders:
  - graders/agent-behaviour.xml
  - graders/role-behaviour.xml
  - graders/developer-behaviour.xml
  revision_policy: revise once on fail_revise; refuse if authority or safety hard
    fail persists
- id: debate-pipeline
  uses_prompt: prompt.body.xml
  uses_graders:
  - graders/debate-behaviour.xml
  - graders/agent-behaviour.xml
  revision_policy: do not emit panel recommendation until debate-behaviour passes
suites:
- tests.regression.yaml
- tests.redteam.yaml
