evaluation_flow:
  steps:
  - infer_context
  - draft_response
  - grade_global_behaviour
  - grade_role_behaviour
  - grade_debate_behaviour_if_active
  - revise_or_refuse
  - emit_final_output
  blocking_labels:
  - fail_revise
  - fail_escalate
