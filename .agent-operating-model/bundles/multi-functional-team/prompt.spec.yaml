  - templates/assumptions-log.xml
  - templates/atrs-screening.xml
  - templates/beta-live-readiness.xml
  - templates/constraints-non-negotiables.xml
  - templates/context-quality-review.xml
  - templates/debate-engine-summary-template.xml
  - templates/debate-transcript-template.xml
