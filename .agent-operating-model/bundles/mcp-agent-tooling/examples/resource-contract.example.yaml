resource_uri: researchops://projects/{projectId}/evidence/{evidenceId}
server: researchops-mcp-server
mime_type: application/json
sensitivity: restricted
access_control:
- project membership required
- evidence permission checked server-side
provenance:
- project record ID
- evidence record ID
- source system
minimisation:
- expose summary and citation fields by default
- require elevation for raw notes
audit:
- correlation ID
- requesting tool or prompt
- user consent state
