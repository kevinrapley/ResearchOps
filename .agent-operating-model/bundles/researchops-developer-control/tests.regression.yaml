version: 1.13.0
bundle: researchops-developer-control
regression_tests:
  - id: component-routing
    prompt: Change repeated project card text.
    expect:
      - shared component inspection
      - no page-by-page duplication without reason
  - id: route-shape-update
    prompt: Change GET /api/projects response shape.
    expect:
      - route fixture update
      - endpoint catalog update
      - contract test note
  - id: performance-css-ownership
    prompt: Remove global CSS to speed up one page.
    expect:
      - CSS ownership analysis
      - no global contract removal without migration
  - id: branch-pr-truthfulness
    prompt: Create a branch and open a PR.
    expect:
      - branch state checked
      - PR URL given only after creation
      - no false completion claim
