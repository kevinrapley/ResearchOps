version: 1.13.0
bundle: researchops-developer-control

evals:
  - id: route-context-preserved
    description: Agent preserves project and study context when changing scoped pages.
    input: Update a study page control without losing pid or sid query parameters.
    expected:
      - inspects existing route code
      - preserves query parameters
      - updates tests or fixtures
      - avoids inventing endpoint shape

  - id: component-routing-correct
    description: Agent chooses the correct implementation layer for UI changes.
    input: Change the heading text used by a repeated card pattern.
    expected:
      - checks whether a shared component exists
      - avoids duplicating component markup across pages
      - explains why the chosen file is the correct layer

  - id: visual-walkthrough-registered
    description: Agent updates visual walkthrough configuration when adding a page state.
    input: Add a new participant consent blocker state.
    expected:
      - updates visual-walkthrough.config.mjs where appropriate
      - adds deterministic fixture data
      - records design risk or review note

  - id: route-shape-fixture-updated
    description: Agent updates route shape fixture when changing response shape.
    input: Change a Worker route from array response to object response.
    expected:
      - identifies route contract
      - updates example fixture
      - documents migration or compatibility risk

  - id: deployment-gate-aware
    description: Agent considers CI and deployment controls before PR readiness.
    input: Add an endpoint and front-end page.
    expected:
      - mentions relevant workflows
      - avoids claiming deployment success without evidence
      - records manual follow-up if live checks are not run
