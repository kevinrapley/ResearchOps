name: Conformance Summary
on:
  pull_request:
jobs:
  conformance-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run conformance:summary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-summary
          path: reports/conformance/
