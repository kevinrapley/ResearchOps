name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:fixtures
      - run: npm run test:route-shapes
      - run: npm run test:route-availability
      - run: npm run test:proxy-worker-joined
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: reports/contracts/
