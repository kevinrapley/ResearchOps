name: route-shape-contract-runner
runtime: node-20
suggested_entrypoint: tools/contracts/run-route-shape-contracts.mjs
reads:
  - examples/conformance/contract-fixture-map.yaml
  - contracts/route-shape-fixture.schema.json
  - examples/**/*.json
validates:
  - fixture map parses and validates against the schema
  - every declared fixture path exists
  - required top-level keys exist in the bundled response fixture
  - request fixtures remain synthetic and do not contain live secrets or real personal data
writes:
  - reports/contracts/contract-test-results.json
  - reports/contracts/contract-test-summary.md
