suite: cloudflare-regression
cases:
- id: worker-fetch-route
  input: Create a Worker route that reads from D1 and returns JSON.
  expects:
  - fetch handler returns Response
  - D1 uses prepared statements
  - required bindings are named
- id: wrangler-secret-review
  input: Review a Wrangler config with sensitive service credentials in vars.
  expects:
  - sensitive values must move to secrets
  - local variable files must not be committed
