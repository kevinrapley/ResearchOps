name = "researchops-worker"
main = "src/worker.js"
compatibility_date = "2026-05-10"

[assets]
directory = "../../public"
binding = "ASSETS"

[vars]
MODEL = "@cf/meta/llama-3.1-8b-instruct"

[[d1_databases]]
binding = "DB"
database_name = "researchops"
database_id = "replace-with-d1-database-id"

[[kv_namespaces]]
binding = "CACHE"
id = "replace-with-kv-namespace-id"

[[r2_buckets]]
binding = "ARTIFACT_BUCKET"
bucket_name = "researchops-artifacts"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "researchops-index"
