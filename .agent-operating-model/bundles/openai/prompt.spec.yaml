bundle:
  id: openai-platform
  name: OpenAI Platform Prompt Bundle
  version: 1.0.0
  status: canonical
  default_mode: openai-build
  source_authority:
  - https://platform.openai.com/docs/
  - https://developers.openai.com/
  prompt_body: prompt.body.xml
design:
  prompt_markup: native semantic XML
  output_contract: output.schema.json
  grade_contract: grade.schema.json
  variables_contract: variables.schema.json
  source_rule: OpenAI platform facts must come from official OpenAI documentation only.
assembly:
  always_load:
  - references/source-catalog.yaml
  - references/openai-platform-context.xml
  - references/responses-api.xml
  - references/tools-function-calling-structured-outputs.xml
  - references/retrieval-files-vector-stores.xml
  - references/embeddings.xml
  - references/batch-webhooks-realtime.xml
  - references/evals-rate-limits-safety.xml
  modes:
  - modes/openai-build.xml
  - modes/openai-review.xml
  - modes/openai-release.xml
  role_modules:
  - roles/openai-developer.xml
  - roles/openai-safety.xml
  - roles/openai-qa.xml
  template_modules:
  - templates/responses-integration.xml
  - templates/structured-output-contract.xml
  - templates/retrieval-pipeline.xml
  contract_modules:
  - contracts/openai-integration-review.schema.json
  - contracts/openai-validation-evidence.schema.json
  - contracts/openai-gap-register.schema.json
  validation_scripts:
  - scripts/validate-source-catalog.py
  grader_modules:
  - graders/openai-behaviour.xml
