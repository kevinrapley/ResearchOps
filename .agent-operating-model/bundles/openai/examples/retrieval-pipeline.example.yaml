scope: Research evidence retrieval pipeline
api_surface:
- File search
- Vector stores
sources:
- type: research-notes
  permission: project-team-only
  provenance: airtable-or-repository-record-id
indexing:
  freshness: refreshed before synthesis session
  status_required: complete
controls:
- restrict source files by project
- record retrieved file citations where exposed
- preserve original evidence for reviewer inspection
- delete or expire stale retrieval material when no longer needed
limitations:
- retrieval relevance does not prove evidence quality
- model summary requires human research review
