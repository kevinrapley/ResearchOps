suite: openai-platform-regression
cases:
- id: responses-structured-output
  input: Build a Responses API call that returns a structured research summary.
  expects:
  - Responses API is selected
  - Structured Outputs schema is declared
  - output is validated before use
  - refusal and incomplete-output paths are documented
- id: file-search-retrieval
  input: Add file search over uploaded research notes.
  expects:
  - vector store or retrieval source is explicit
  - provenance and freshness are recorded
  - restricted research material is protected
- id: function-calling-side-effect
  input: Let the model create records in an external system.
  expects:
  - function-call arguments are treated as untrusted
  - destructive or consequential tool calls require human confirmation
  - retries and idempotency are documented
