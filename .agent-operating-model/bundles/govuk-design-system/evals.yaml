      high_stakes: false

  - id: coverage-date-input
    description: Test coverage for date input guidance.
    input: Explain how to ask users for a date using the date input component.
    context:
      task: design
      mode: design
      component: date-input
      depth: standard
      high_stakes: false

  - id: coverage-check-answers
    description: Test coverage for check answers page guidance.
    input: Describe how a check answers page should work.
    context:
      task: design
      mode: design
      pattern: check-answers
      depth: standard
      high_stakes: false

  - id: coverage-colour
    description: Test coverage for colour and accessibility guidance.
    input: What are the colour contrast requirements under WCAG 2.2?
    context:
      task: design
      mode: design
      component: colour
      depth: standard
      high_stakes: false