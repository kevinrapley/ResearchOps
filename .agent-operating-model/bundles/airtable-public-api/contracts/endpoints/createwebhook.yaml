operation_id: createWebhook
summary: Create a webhook for base changes.
family: webhooks
layer: webhooks-manage
method: POST
url_template: https://api.airtable.com/v0/bases/{baseId}/webhooks
path_template: /bases/{baseId}/webhooks
reference:
  source_url: https://airtable.com/developers/web/api/create-webhook
  source_status: official-reference-url-secondary-confirmed
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - webhook:manage
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  query: []
request_body:
  present: true
  content_type: application/json
  schema:
    type: object
    required:
    - notificationUrl
    - specification
    properties:
      notificationUrl:
        type: string
      specification:
        type: object
        properties:
          options:
            type: object
            additionalProperties: true
          filters:
            type: object
            additionalProperties: true
        additionalProperties: true
    additionalProperties: false
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape_inline:
      type: object
      required:
      - id
      - expirationTime
      - macSecretBase64
      properties:
        id:
          type: string
        expirationTime:
          type: string
        macSecretBase64:
          type: string
        specification:
          type: object
          additionalProperties: true
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: Missing token or token invalid.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Scope or permission denied.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: Resource not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Rate limited.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: Server error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
inline_error_envelope:
  type: object
  required:
  - error
  properties:
    error:
      type: object
      required:
      - type
      - message
      properties:
        type:
          type: string
        message:
          type: string
        statusCode:
          type: integer
        details:
          type: array
          items:
            type: object
            required:
            - message
            properties:
              code:
                type: string
              message:
                type: string
              field:
                type: string
            additionalProperties: true
      additionalProperties: true
  additionalProperties: true
code_examples:
  node: |-
    const baseUrl = 'https://api.airtable.com/v0';
    const baseId = process.env.AIRTABLE_BASE_ID || 'YOUR_BASEID';
    const payload = {
      "notificationUrl": "https://example.com/airtable/webhook",
      "specification": {
        "options": {
          "filters": {
            "dataTypes": [
              "tableData"
            ]
          }
        }
      }
    };
    const response = await fetch(`${baseUrl}/bases/${baseId}/webhooks`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${process.env.AIRTABLE_TOKEN}`,
        Accept: 'application/json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload),
    });
    const data = response.status === 204 ? null : await response.json();
    console.log(response.status, data);
  ruby: |-
    require 'net/http'
    require 'json'
    require 'uri'
    baseId = ENV.fetch('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    payload = {
      "notificationUrl": "https://example.com/airtable/webhook",
      "specification": {
        "options": {
          "filters": {
            "dataTypes": [
              "tableData"
            ]
          }
        }
      }
    }
    uri = URI("https://api.airtable.com/v0/bases/#{baseId}/webhooks")
    request = Net::HTTP::Post.new(uri)
    request['Authorization'] = "Bearer #{ENV.fetch('AIRTABLE_TOKEN')}"
    request['Accept'] = 'application/json'
    request['Content-Type'] = 'application/json'
    request.body = JSON.dump(payload)
    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
    data = response.code == '204' ? nil : JSON.parse(response.body)
    puts [response.code, data].inspect
  php: |-
    <?php
    $baseId = getenv('AIRTABLE_BASE_ID') ?: 'YOUR_BASEID';
    $payload = [
        'notificationUrl' => 'https://example.com/airtable/webhook',
        'specification' => [
            'options' => [
                'filters' => [
                    'dataTypes' => [
                        'tableData'
                    ]
                ]
            ]
        ]
    ];
    $ch = curl_init('https://api.airtable.com/v0/bases/' . $baseId . '/webhooks');
    $headers = [
        "Authorization: Bearer " . getenv("AIRTABLE_TOKEN"),
        "Accept: application/json",
        "Content-Type: application/json",
    ];
    $options = [
        CURLOPT_CUSTOMREQUEST => 'POST',
        CURLOPT_RETURNTRANSFER => true,
        CURLOPT_HTTPHEADER => $headers,
        CURLOPT_POSTFIELDS => json_encode($payload),
    ];
    curl_setopt_array($ch, $options);
    $body = curl_exec($ch);
    $status = curl_getinfo($ch, CURLINFO_HTTP_CODE);
    curl_close($ch);
    $data = $status === 204 ? null : json_decode($body, true);
    var_dump($status, $data);
  python: |-
    import os
    import requests
    baseId = os.getenv('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    payload = {
      "notificationUrl": "https://example.com/airtable/webhook",
      "specification": {
        "options": {
          "filters": {
            "dataTypes": [
              "tableData"
            ]
          }
        }
      }
    }
    headers = {
        'Authorization': f"Bearer {os.environ['AIRTABLE_TOKEN']}",
        'Accept': 'application/json',
        'Content-Type': 'application/json',
    }
    response = requests.request('POST', f'https://api.airtable.com/v0/bases/{baseId}/webhooks', headers=headers, json=payload)
    data = None if response.status_code == 204 else response.json()
    print(response.status_code, data)
contract_strength:
  path_method: high-confidence
  request_shape: official-or-secondary-confirmed
  response_shape: family-derived-and-publicly-consistent
  source_basis: official-reference-url-secondary-confirmed
notes:
- Support docs and community examples confirm webhook creation and MAC verification behavior.
