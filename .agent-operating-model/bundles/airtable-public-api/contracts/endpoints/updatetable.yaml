code_examples:
  node: |-
    const baseUrl = 'https://api.airtable.com/v0';
    const baseId = process.env.AIRTABLE_BASE_ID || 'YOUR_BASEID';
    const tableId = process.env.AIRTABLE_TABLE_ID || 'YOUR_TABLEID';
    const payload = {
      "name": "Inbound Events",
      "description": "Writes from external webhook consumer."
    };
    const response = await fetch(`${baseUrl}/meta/bases/${baseId}/tables/${tableId}`, {
      method: 'PATCH',
      headers: {
        Authorization: `Bearer ${process.env.AIRTABLE_TOKEN}`,
        Accept: 'application/json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload),
    });
    const data = response.status === 204 ? null : await response.json();
    console.log(response.status, data);
  ruby: |-
    require 'net/http'
    require 'json'
    require 'uri'
    baseId = ENV.fetch('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    tableId = ENV.fetch('AIRTABLE_TABLE_ID', 'YOUR_TABLEID')
    payload = {
      "name": "Inbound Events",
      "description": "Writes from external webhook consumer."
    }
    uri = URI("https://api.airtable.com/v0/meta/bases/#{baseId}/tables/#{tableId}")
    request = Net::HTTP::Patch.new(uri)
    request['Authorization'] = "Bearer #{ENV.fetch('AIRTABLE_TOKEN')}"
    request['Accept'] = 'application/json'
    request['Content-Type'] = 'application/json'
    request.body = JSON.dump(payload)
    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
    data = response.code == '204' ? nil : JSON.parse(response.body)
    puts [response.code, data].inspect
  php: |-
    <?php
    $baseId = getenv('AIRTABLE_BASE_ID') ?: 'YOUR_BASEID';
    $tableId = getenv('AIRTABLE_TABLE_ID') ?: 'YOUR_TABLEID';
    $payload = [
        'name' => 'Inbound Events',
        'description' => 'Writes from external webhook consumer.'
    ];
    $ch = curl_init('https://api.airtable.com/v0/meta/bases/' . $baseId . '/tables/' . $tableId);
    $headers = [
        "Authorization: Bearer " . getenv("AIRTABLE_TOKEN"),
        "Accept: application/json",
        "Content-Type: application/json",
    ];
    $options = [
        CURLOPT_CUSTOMREQUEST => 'PATCH',
        CURLOPT_RETURNTRANSFER => true,
        CURLOPT_HTTPHEADER => $headers,
        CURLOPT_POSTFIELDS => json_encode($payload),
    ];
    curl_setopt_array($ch, $options);
    $body = curl_exec($ch);
    $status = curl_getinfo($ch, CURLINFO_HTTP_CODE);
    curl_close($ch);
    $data = $status === 204 ? null : json_decode($body, true);
    var_dump($status, $data);
  python: |-
    import os
    import requests
    baseId = os.getenv('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    tableId = os.getenv('AIRTABLE_TABLE_ID', 'YOUR_TABLEID')
    payload = {
      "name": "Inbound Events",
      "description": "Writes from external webhook consumer."
    }
    headers = {
        'Authorization': f"Bearer {os.environ['AIRTABLE_TOKEN']}",
        'Accept': 'application/json',
        'Content-Type': 'application/json',
    }
    response = requests.request('PATCH', f'https://api.airtable.com/v0/meta/bases/{baseId}/tables/{tableId}', headers=headers, json=payload)
    data = None if response.status_code == 204 else response.json()
    print(response.status_code, data)
contract_strength:
  path_method: high-confidence
  request_shape: official-or-secondary-confirmed
  response_shape: family-derived-and-publicly-consistent
  source_basis: official-reference-url-secondary-confirmed
notes:
- Public community references indicate current direct support is limited to conservative table metadata updates.
