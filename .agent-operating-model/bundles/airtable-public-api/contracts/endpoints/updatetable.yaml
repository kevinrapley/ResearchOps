operation_id: updateTable
summary: Update a table name or description.
family: metadata
layer: schema-write
method: PATCH
url_template: https://api.airtable.com/v0/meta/bases/{baseId}/tables/{tableId}
path_template: /meta/bases/{baseId}/tables/{tableId}
reference:
  source_url: https://airtable.com/developers/web/api/update-table
  source_status: official-reference-url-secondary-confirmed
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - schema.base:write
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  - name: tableId
    in: path
    required: true
    type: string
  query: []
request_body:
  present: true
  content_type: application/json
  schema:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
    additionalProperties: false
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape_inline:
      type: object
      required:
      - id
      - name
      - fields
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        primaryFieldId:
          type: string
        fields:
          type: array
          items:
            type: object
            required:
            - id
            - name
            - type
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              type:
                type: string
              options:
                type: object
                additionalProperties: true
            additionalProperties: true
        views:
          type: array
          items:
            type: object
            required:
            - id
            - name
            - type
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
              tableId:
                type: string
              personalForUserId:
                type: string
            additionalProperties: true
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: Missing token or token invalid.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Scope or permission denied.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: Resource not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Rate limited.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: Server error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
inline_error_envelope:
  type: object
  required:
  - error
  properties:
    error:
      type: object
      required:
