operation_id: updateMultipleRecords
summary: Update multiple records or perform an upsert.
family: records
layer: records-write-batch
method: PATCH
url_template: https://api.airtable.com/v0/{baseId}/{tableIdOrName}
path_template: /{baseId}/{tableIdOrName}
reference:
  source_url: https://airtable.com/developers/web/api/update-multiple-records
  source_status: official-reference-url-secondary-confirmed
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - data.records:write
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  - name: tableIdOrName
    in: path
    required: true
    type: string
  query: []
request_body:
  present: true
  content_type: application/json
  schema:
    type: object
    required:
    - records
    properties:
      records:
        type: array
        items:
          type: object
          required:
          - id
          - fields
          properties:
            id:
              type: string
            fields:
              type: object
              additionalProperties: true
          additionalProperties: true
      performUpsert:
        type: object
        properties:
          fieldsToMergeOn:
            type: array
            items:
              type: string
        additionalProperties: true
      typecast:
        type: boolean
      returnFieldsByFieldId:
        type: boolean
    additionalProperties: false
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape_inline:
      type: object
      required:
      - records
      properties:
        records:
          type: array
          items:
            type: object
            required:
            - id
            - createdTime
            - fields
            properties:
              id:
                type: string
              createdTime:
                type: string
              fields:
                type: object
                additionalProperties: true
              commentCount:
                type: integer
            additionalProperties: true
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: Missing token or token invalid.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Scope or permission denied.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: Resource not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Rate limited.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: Server error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
inline_error_envelope:
  type: object
  required:
  - error
  properties:
    error:
      type: object
      required:
      - type
      - message
      properties:
        type:
          type: string
        message:
          type: string
        statusCode:
          type: integer
        details:
          type: array
          items:
            type: object
            required:
            - message
            properties:
              code:
                type: string
              message:
                type: string
              field:
                type: string
            additionalProperties: true
      additionalProperties: true
  additionalProperties: true
code_examples:
  node: |-
    const baseUrl = 'https://api.airtable.com/v0';
    const baseId = process.env.AIRTABLE_BASE_ID || 'YOUR_BASEID';
    const tableIdOrName = process.env.AIRTABLE_TABLE || 'YOUR_TABLEIDORNAME';
    const payload = {
      "records": [
        {
          "id": "recXXXXXXXXXXXXXX",
          "fields": {
            "Status": "Done"
          }
        }
      ],
      "performUpsert": {
        "fieldsToMergeOn": [
          "External ID"
        ]
      },
      "typecast": true
    };
    const response = await fetch(`${baseUrl}/${baseId}/${tableIdOrName}`, {
      method: 'PATCH',
      headers: {
        Authorization: `Bearer ${process.env.AIRTABLE_TOKEN}`,
        Accept: 'application/json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload),
    });
    const data = response.status === 204 ? null : await response.json();
    console.log(response.status, data);
  ruby: |-
    require 'net/http'
    require 'json'
    require 'uri'
    baseId = ENV.fetch('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    tableIdOrName = ENV.fetch('AIRTABLE_TABLE', 'YOUR_TABLEIDORNAME')
    payload = {
      "records": [
        {
          "id": "recXXXXXXXXXXXXXX",
          "fields": {
            "Status": "Done"
          }
        }
      ],
      "performUpsert": {
        "fieldsToMergeOn": [
          "External ID"
        ]
      },
      "typecast": true
    }
    uri = URI("https://api.airtable.com/v0/#{baseId}/#{tableIdOrName}")
    request = Net::HTTP::Patch.new(uri)
    request['Authorization'] = "Bearer #{ENV.fetch('AIRTABLE_TOKEN')}"
    request['Accept'] = 'application/json'
    request['Content-Type'] = 'application/json'
    request.body = JSON.dump(payload)
    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
    data = response.code == '204' ? nil : JSON.parse(response.body)
    puts [response.code, data].inspect
  php: |-
    <?php
    $baseId = getenv('AIRTABLE_BASE_ID') ?: 'YOUR_BASEID';
    $tableIdOrName = getenv('AIRTABLE_TABLE') ?: 'YOUR_TABLEIDORNAME';
    $payload = [
        'records' => [
            [
                'id' => 'recXXXXXXXXXXXXXX',
                'fields' => [
                    'Status' => 'Done'
                ]
            ]
        ],
        'performUpsert' => [
            'fieldsToMergeOn' => [
                'External ID'
            ]
        ],
        'typecast' => true
    ];
    $ch = curl_init('https://api.airtable.com/v0/' . $baseId . '/' . $tableIdOrName);
    $headers = [
        "Authorization: Bearer " . getenv("AIRTABLE_TOKEN"),
        "Accept: application/json",
        "Content-Type: application/json",
    ];
    $options = [
        CURLOPT_CUSTOMREQUEST => 'PATCH',
        CURLOPT_RETURNTRANSFER => true,
        CURLOPT_HTTPHEADER => $headers,
        CURLOPT_POSTFIELDS => json_encode($payload),
    ];
    curl_setopt_array($ch, $options);
    $body = curl_exec($ch);
    $status = curl_getinfo($ch, CURLINFO_HTTP_CODE);
    curl_close($ch);
    $data = $status === 204 ? null : json_decode($body, true);
    var_dump($status, $data);
  python: |-
    import os
    import requests
    baseId = os.getenv('AIRTABLE_BASE_ID', 'YOUR_BASEID')
    tableIdOrName = os.getenv('AIRTABLE_TABLE', 'YOUR_TABLEIDORNAME')
    payload = {
      "records": [
        {
          "id": "recXXXXXXXXXXXXXX",
          "fields": {
            "Status": "Done"
          }
        }
      ],
      "performUpsert": {
        "fieldsToMergeOn": [
          "External ID"
        ]
      },
      "typecast": true
    }
    headers = {
        'Authorization': f"Bearer {os.environ['AIRTABLE_TOKEN']}",
        'Accept': 'application/json',
        'Content-Type': 'application/json',
    }
    response = requests.request('PATCH', f'https://api.airtable.com/v0/{baseId}/{tableIdOrName}', headers=headers, json=payload)
    data = None if response.status_code == 204 else response.json()
    print(response.status_code, data)
contract_strength:
  path_method: high-confidence
  request_shape: official-or-secondary-confirmed
  response_shape: family-derived-and-publicly-consistent
  source_basis: official-reference-url-secondary-confirmed
notes:
- Official support docs explicitly mention performUpsert on this endpoint.
- Official support docs say batching supports up to 10 records per request.
