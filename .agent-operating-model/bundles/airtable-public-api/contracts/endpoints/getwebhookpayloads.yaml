operation_id: getWebhookPayloads
summary: Retrieve webhook payload pages after a webhook notification.
family: webhooks
layer: webhooks-consume
method: GET
url_template: https://api.airtable.com/v0/bases/{baseId}/webhooks/{webhookId}/payloads
path_template: /bases/{baseId}/webhooks/{webhookId}/payloads
reference:
  source_url: https://airtable.com/developers/web/api/get-webhook-payloads
  source_status: official-reference-url-secondary-confirmed
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - webhook:manage
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  - name: webhookId
    in: path
    required: true
    type: string
  query:
  - name: cursor
    in: query
    required: false
    type: integer
request_body:
