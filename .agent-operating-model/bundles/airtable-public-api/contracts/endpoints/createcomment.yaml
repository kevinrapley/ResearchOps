operation_id: createComment
summary: Create a comment on a record.
family: comments
layer: comments-write
method: POST
url_template: https://api.airtable.com/v0/{baseId}/{tableIdOrName}/{recordId}/comments
path_template: /{baseId}/{tableIdOrName}/{recordId}/comments
reference:
  source_url: https://airtable.com/developers/web/api/create-comment
  source_status: official-reference-url-pattern
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - data.recordComments:write
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  - name: tableIdOrName
    in: path
    required: true
    type: string
  - name: recordId
    in: path
    required: true
    type: string
  query: []
request_body:
  present: true
  content_type: application/json
  schema:
    type: object
    required:
    - text
    properties:
      text:
        type: string
      mentioned:
        type: array
        items:
          type: object
          additionalProperties: true
      attachments:
        type: array
        items:
          type: object
          additionalProperties: true
    additionalProperties: false
responses:
