operation_id: createBase
summary: Create a base in a workspace.
family: metadata
layer: schema-write
method: POST
url_template: https://api.airtable.com/v0/meta/bases
path_template: /meta/bases
reference:
  source_url: https://airtable.com/developers/web/api/create-base
  source_status: official-reference-url-secondary-confirmed
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - schema.base:write
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path: []
  query: []
request_body:
  present: true
  content_type: application/json
  schema:
    type: object
    required:
    - name
    - workspaceId
    properties:
      name:
        type: string
      workspaceId:
        type: string
      tables:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            fields:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
    additionalProperties: false
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape_inline:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
        name:
          type: string
        permissionLevel:
          type: string
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: Missing token or token invalid.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Scope or permission denied.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: Resource not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Rate limited.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: Server error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
inline_error_envelope:
  type: object
  required:
  - error
  properties:
    error:
      type: object
      required:
      - type
      - message
      properties:
        type:
          type: string
        message:
          type: string
        statusCode:
          type: integer
        details:
          type: array
          items:
            type: object
            required:
            - message
            properties:
              code:
                type: string
              message:
                type: string
              field:
                type: string
            additionalProperties: true
      additionalProperties: true
  additionalProperties: true
code_examples:
  node: |-
    const baseUrl = 'https://api.airtable.com/v0';
    const payload = {
      "name": "Integration Base",
      "workspaceId": "wspXXXXXXXXXXXXXX",
      "tables": [
        {
          "name": "Projects",
          "fields": [
            {
              "name": "Name",
              "type": "singleLineText"
            }
          ]
        }
      ]
    };
    const response = await fetch(`${baseUrl}/meta/bases`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${process.env.AIRTABLE_TOKEN}`,
        Accept: 'application/json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload),
    });
    const data = response.status === 204 ? null : await response.json();
    console.log(response.status, data);
  ruby: |-
    require 'net/http'
    require 'json'
    require 'uri'
    payload = {
      "name": "Integration Base",
      "workspaceId": "wspXXXXXXXXXXXXXX",
      "tables": [
        {
          "name": "Projects",
          "fields": [
            {
              "name": "Name",
              "type": "singleLineText"
            }
          ]
        }
      ]
    }
    uri = URI("https://api.airtable.com/v0/meta/bases")
    request = Net::HTTP::Post.new(uri)
    request['Authorization'] = "Bearer #{ENV.fetch('AIRTABLE_TOKEN')}"
    request['Accept'] = 'application/json'
    request['Content-Type'] = 'application/json'
    request.body = JSON.dump(payload)
    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
    data = response.code == '204' ? nil : JSON.parse(response.body)
    puts [response.code, data].inspect
  php: |-
    <?php
    $payload = [
        'name' => 'Integration Base',
        'workspaceId' => 'wspXXXXXXXXXXXXXX',
        'tables' => [
            [
                'name' => 'Projects',
                'fields' => [
                    [
                        'name' => 'Name',
                        'type' => 'singleLineText'
                    ]
                ]
            ]
        ]
    ];
    $ch = curl_init('https://api.airtable.com/v0/meta/bases');
    $headers = [
        "Authorization: Bearer " . getenv("AIRTABLE_TOKEN"),
        "Accept: application/json",
        "Content-Type: application/json",
    ];
    $options = [
        CURLOPT_CUSTOMREQUEST => 'POST',
        CURLOPT_RETURNTRANSFER => true,
        CURLOPT_HTTPHEADER => $headers,
        CURLOPT_POSTFIELDS => json_encode($payload),
    ];
    curl_setopt_array($ch, $options);
    $body = curl_exec($ch);
    $status = curl_getinfo($ch, CURLINFO_HTTP_CODE);
    curl_close($ch);
    $data = $status === 204 ? null : json_decode($body, true);
    var_dump($status, $data);
  python: |-
    import os
    import requests
    payload = {
      "name": "Integration Base",
      "workspaceId": "wspXXXXXXXXXXXXXX",
      "tables": [
        {
          "name": "Projects",
          "fields": [
            {
              "name": "Name",
              "type": "singleLineText"
            }
          ]
        }
      ]
    }
    headers = {
        'Authorization': f"Bearer {os.environ['AIRTABLE_TOKEN']}",
        'Accept': 'application/json',
        'Content-Type': 'application/json',
    }
    response = requests.request('POST', f'https://api.airtable.com/v0/meta/bases', headers=headers, json=payload)
    data = None if response.status_code == 204 else response.json()
    print(response.status_code, data)
contract_strength:
  path_method: high-confidence
  request_shape: official-or-secondary-confirmed
  response_shape: family-derived-and-publicly-consistent
  source_basis: official-reference-url-secondary-confirmed
notes:
- Community references and public official-url patterns indicate this endpoint exists.
