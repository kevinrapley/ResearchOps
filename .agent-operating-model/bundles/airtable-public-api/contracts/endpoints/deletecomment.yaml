operation_id: deleteComment
summary: Delete a comment by id.
family: comments
layer: comments-write
method: DELETE
url_template: https://api.airtable.com/v0/{baseId}/{tableIdOrName}/{recordId}/comments/{commentId}
path_template: /{baseId}/{tableIdOrName}/{recordId}/comments/{commentId}
reference:
  source_url: https://airtable.com/developers/web/api/delete-comment
  source_status: official-reference-url-pattern
  languages_listed_by_docs:
  - Node
  - Ruby
  - PHP
  - Python
versioning:
  path_segment: v0
  default_version: v0
  versioning_note: Airtable Web API and metadata endpoints use the /v0 base path.
auth:
  scheme: Bearer token
  token_types:
  - personal_access_token
  - oauth_access_token
authorization:
  minimum_scopes:
  - data.records:write
  scope_resolution_rule: Request the smallest viable scope set that satisfies the operation.
parameters:
  path:
  - name: baseId
    in: path
    required: true
    type: string
  - name: tableIdOrName
    in: path
    required: true
    type: string
  - name: recordId
    in: path
    required: true
    type: string
  - name: commentId
    in: path
    required: true
    type: string
  query: []
request_body:
  present: false
  content_type: null
  schema: null
responses:
  '200':
    description: Success
    content_type: application/json
    body_shape_inline:
      type: object
      required:
      - id
      - deleted
      properties:
        id:
          type: string
        deleted:
          type: boolean
      additionalProperties: true
  '400':
    description: Request invalid or malformed.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/bad_request
  '401':
    description: Missing token or token invalid.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/unauthorized
  '403':
    description: Scope or permission denied.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/forbidden
  '404':
    description: Resource not found.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/not_found
  '429':
    description: Rate limited.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/rate_limited
  '500':
    description: Server error.
    content_type: application/json
    body_shape:
      $ref: ../common/error-responses.yaml#/server_error
