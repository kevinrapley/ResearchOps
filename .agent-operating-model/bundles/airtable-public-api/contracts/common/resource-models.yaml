record:
  type: object
  required:
  - id
  - createdTime
  - fields
  properties:
    id:
      type: string
    createdTime:
      type: string
    fields:
      type: object
      additionalProperties: true
    commentCount:
      type: integer
  additionalProperties: true
record_delete_result:
  type: object
  required:
  - id
  - deleted
  properties:
    id:
      type: string
    deleted:
      type: boolean
  additionalProperties: true
comment:
  type: object
  required:
  - id
  - text
  - createdTime
  properties:
    id:
      type: string
    text:
      type: string
    createdTime:
      type: string
    lastUpdatedTime:
      type: string
    author:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
      additionalProperties: true
    mentioned:
      type: array
      items:
        type: object
        additionalProperties: true
    attachments:
      type: array
      items:
        type: object
        additionalProperties: true
  additionalProperties: true
base_summary:
  type: object
  required:
  - id
  - name
  properties:
    id:
      type: string
    name:
      type: string
    permissionLevel:
      type: string
  additionalProperties: true
view_summary:
  type: object
  required:
  - id
  - name
  - type
  properties:
    id:
      type: string
    name:
      type: string
    type:
      type: string
    tableId:
      type: string
    personalForUserId:
      type: string
  additionalProperties: true
field_model:
  type: object
  required:
  - id
  - name
  - type
  properties:
    id:
      type: string
    name:
      type: string
    description:
      type: string
    type:
      type: string
    options:
      type: object
      additionalProperties: true
  additionalProperties: true
table_schema:
  type: object
  required:
  - id
  - name
  - fields
  properties:
    id:
      type: string
    name:
      type: string
    description:
      type: string
    primaryFieldId:
      type: string
    fields:
      type: array
      items:
        $ref: '#/field_model'
    views:
      type: array
      items:
        $ref: '#/view_summary'
  additionalProperties: true
webhook:
  type: object
  required:
  - id
  - expirationTime
  properties:
    id:
      type: string
    expirationTime:
      type: string
    notificationUrl:
      type: string
    areNotificationsEnabled:
      type: boolean
    cursorForNextPayload:
      type: integer
    specification:
      type: object
      additionalProperties: true
  additionalProperties: true
webhook_payload:
  type: object
  required:
  - cursor
  properties:
    cursor:
      type: integer
    baseTransactionNumber:
      type: integer
    timestamp:
      type: string
    changedTablesById:
      type: object
      additionalProperties: true
    createdRecordsByTableId:
      type: object
      additionalProperties: true
    destroyedRecordIdsByTableId:
      type: object
      additionalProperties: true
    error:
      type: boolean
  additionalProperties: true
