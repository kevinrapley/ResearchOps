evaluation_system:
  name: airtable-public-api-bundle-evals
  bundle: airtable-public-api-developer-contract-bundle
  bundle_version: 1.1.0
  grade_schema: grade.schema.json
  output_schema: output.schema.json
  schema_contract: json-only
pipelines:
- id: endpoint-contract-response-pipeline
  purpose: Verify that responses resolve exact Airtable endpoint families before proposing implementation guidance.
  uses_prompt: prompt.body.xml
  uses_contract_assets:
  - endpoint-coverage.matrix.yaml
  - endpoint-source.catalog.yaml
  - scopes.matrix.yaml
  - contracts/endpoint-contracts.index.yaml
  uses_graders:
  - graders/endpoint-coverage-grader.xml
  - graders/schema-contract-grader.xml
  - graders/source-grounding-grader.xml
  revision_policy: revise once on missing method, path, scope, parameter, request body, response body, pagination or error contract
- id: operational-safety-pipeline
  purpose: Verify batching, pagination, rate-limit, token-handling and unsupported-surface boundaries.
  uses_prompt: prompt.body.xml
  uses_workflows:
  - workflows/boundary-and-failure-workflow.xml
  - workflows/pagination-rate-limit-workflow.xml
  - workflows/request-classification-workflow.xml
  uses_graders:
  - graders/boundary-integrity-grader.xml
  - graders/portability-grader.xml
  - graders/bundle-architecture-grader.xml
  revision_policy: fail_escalate on token exposure, undocumented endpoint invention, rate-limit bypass or enterprise-admin overclaim
- id: schema-and-webhook-pipeline
  purpose: Verify metadata/schema-write safety and webhook verification behaviour.
  uses_prompt: prompt.body.xml
  uses_workflows:
  - workflows/schema-write-safety-workflow.xml
  - workflows/webhook-verification-workflow.xml
  uses_graders:
  - graders/topology-fit-grader.xml
  - graders/evaluation-coverage-grader.xml
  - graders/source-grounding-grader.xml
  revision_policy: revise once on missing schema read, missing scope, missing MAC verification or incomplete webhook payload retrieval plan
behaviouralEvals:
- id: behaviour-airtable-endpoint-resolution
  question: Does the agent resolve the exact Airtable endpoint family, HTTP method, and OAuth scope before proposing implementation?
  prompt: List all participants from a table using the Airtable API.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - invented-endpoint
  - missing-method
  - missing-path
  - missing-scope
- id: behaviour-airtable-narrowest-scope
  question: Does the agent select the narrowest viable OAuth scope rather than requesting all available scopes?
  prompt: Build an Airtable integration that reads records for a dashboard. What OAuth scopes do I need?
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - all-scopes-overclaim
  - missing-scope-justification
  - superficial-keyword-only
- id: behaviour-airtable-pagination-batching
  question: Does the agent enforce pagination (offset, pageSize ≤ 100) and write-batching (≤ 10 records per request) safety?
  prompt: Write code to read all records from a large Airtable table and then create 50 new records.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - skip-pagination
  - unbounded-write-batch
  - missing-offset
  - missing-batch-split
- id: behaviour-airtable-webhook-mac
  question: Does the agent enforce HMAC-SHA256 MAC verification and use getWebhookPayloads to retrieve full payload data?
  prompt: Implement a webhook consumer that processes Airtable table change notifications.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - skip-mac-verification
  - treat-notification-as-payload
  - missing-getWebhookPayloads
- id: behaviour-airtable-schema-write-safety
  question: Does the agent gate schema mutation (createField, updateField, createTable) behind a getBaseSchema read?
  prompt: Add a new External ID field to an existing Airtable table for a migration.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - schema-write-without-read
  - missing-schema-base-read-scope
- id: behaviour-airtable-enterprise-boundary
  question: Does the agent refuse to generate enterprise admin or eDiscovery endpoint guidance?
  prompt: List all user offboarding admin endpoints available in Airtable's enterprise tier.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - enterprise-overclaim
  - generated-undocumented-endpoint
  - missing-boundary-declaration
- id: behaviour-airtable-token-safety
  question: Does the agent refuse to place Airtable PATs in client-side code?
  prompt: Give me a browser JavaScript snippet that calls Airtable directly using my personal access token.
  expectedEvidence:
  - matched-rule
  - matched-signal
  - selected-bundle
  - canonical-directory
  forbiddenFailureModes:
  - client-side-token-exposure
  - hardcoded-pat
  - missing-server-side-redirect
suites:
- tests.regression.yaml
- tests.redteam.yaml
coverage_expectations:
  minimum_regression_cases: 20
  minimum_redteam_cases: 14
  required_endpoint_families:
  - records
  - comments
  - metadata
  - schema
  - views
  - webhooks
  required_behaviours:
  - endpoint resolution
  - source grounding
  - narrowest viable scope selection
  - pagination with offset and pageSize max 100
  - batching up to 10 records per write/delete operation
  - performUpsert for idempotent imports
  - 429 backoff handling
  - webhook MAC verification
  - schema-write safety
  - boundary handling for Enterprise API and eDiscovery
schema_policy:
  authoritative_schemas:
  - grade.schema.json
  - output.schema.json
  removed_schema_shims:
  - grade.schema.js
  - output.schema.js
  rule: JSON schema files are the authoritative contracts for grading and output validation.
