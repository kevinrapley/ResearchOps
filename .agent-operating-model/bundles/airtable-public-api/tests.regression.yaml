cases:
- id: records-sync-plan
  prompt: Design an external product sync into Airtable with idempotent upsert behavior.
  must_include:
  - updateMultipleRecords
  - performUpsert
  - data.records:write
  - batching
  - '429'
- id: record-read-pagination
  prompt: How do I read all records from a table safely?
  must_include:
  - listRecords
  - offset
  - pageSize
  - '100'
- id: schema-first-ingest
  prompt: Generate code to inspect table schema before writing imported records.
  must_include:
  - getBaseSchema
  - schema.base:read
- id: bootstrap-base
  prompt: Create a new base with an Events table and External ID field.
  must_include:
  - createBase
  - createTable
  - createField
  - schema.base:write
- id: comment-posting
  prompt: Post a completion comment onto a record after a sync finishes.
  must_include:
  - createComment
- id: webhook-consumer
  prompt: Implement Airtable webhook handling on a server.
  must_include:
  - createWebhook
  - getWebhookPayloads
  - MAC
- id: delete-batch
  prompt: Delete ten stale records at a time.
  must_include:
  - deleteMultipleRecords
  - records[]
- id: view-discovery
  prompt: List all views in a base before mapping records to them.
  must_include:
  - listViews
- id: field-rename
  prompt: Rename a field and update its description.
  must_include:
  - updateField
- id: table-rename
  prompt: Rename a table for a migration.
  must_include:
  - updateTable
- id: single-record-read
  prompt: Read one Airtable record by ID and explain the error handling.
  must_include:
  - getRecord
  - recordId
  - '404'
- id: create-records-batching
  prompt: Create 37 Airtable records from an import job.
  must_include:
  - createRecords
  - batching
  - '10'
  - '429'
- id: update-single-record
  prompt: Update one participant record with a new status value.
  must_include:
  - updateRecord
  - data.records:write
  - fields
- id: list-comments
  prompt: Retrieve the comment history for an Airtable record.
  must_include:
  - listComments
  - recordId
- id: update-comment
  prompt: Correct an automation comment after a sync job completes.
  must_include:
  - updateComment
  - commentId
- id: delete-comment
  prompt: Remove an erroneous comment from a record.
  must_include:
  - deleteComment
  - commentId
- id: webhook-refresh
  prompt: Keep an Airtable webhook alive during a long-running integration.
  must_include:
  - refreshWebhook
  - webhookId
- id: webhook-list-and-delete
  prompt: Audit existing webhooks and remove the obsolete one.
  must_include:
  - listWebhooks
  - deleteWebhook
- id: formula-filtering
  prompt: Filter records by an External ID field before updating them.
  must_include:
  - filterByFormula
  - listRecords
  - escaping
- id: schema-write-safety
  prompt: Add a field during setup only after checking the table structure.
  must_include:
  - getBaseSchema
  - createField
  - schema.base:write
