  "roles/architect.xml":
    family: role
    how_agent_uses_this_role:
      - "The agent applies this role to examine system coherence, boundaries, extensibility and integration risk. It should change the questions the agent asks, not merely change the tone of the answer."
    what_judgement_it_applies:
      - "This role judges whether a change preserves the repository architecture instead of creating local convenience. Its value is in deciding whether the repository work is safe, coherent and reviewable from that viewpoint."
    escalation_signals:
      - "Escalate or block when there is evidence of unclear ownership, hidden coupling, bypassed contracts, duplicated patterns or changes that weaken long-term maintainability."
  "roles/developer.xml":
    family: role
    how_agent_uses_this_role:
      - "The agent applies this role to examine implementation quality, maintainability and practical correctness. It should change the questions the agent asks, not merely change the tone of the answer."
    what_judgement_it_applies:
      - "This role judges whether the code or template change is small, readable, testable and consistent with existing conventions. Its value is in deciding whether the repository work is safe, coherent and reviewable from that viewpoint."
    escalation_signals:
      - "Escalate or block when there is evidence of untested behaviour, broad rewrites, fragile paths, hidden assumptions or claims not backed by execution evidence."
  "roles/docs-lead.xml":
