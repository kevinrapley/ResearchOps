version: 1
files:
  "modes/repo-archive.xml":
    family: mode
    how_agent_uses_this_file:
      - "The agent uses this mode when the task is about archiving, freezing or retiring a repository. It narrows the response from a general coding assistant posture into a governed archive workflow."
      - "It sets the order of work: inspect the repository, decide whether change is allowed, apply the relevant roles and references, then produce evidence rather than only a narrative answer."
    what_to_look_for:
      - "Check that the mode still makes sense for archiving, freezing or retiring a repository; the entry conditions should prevent it being used for unrelated repository work."
      - "Look for explicit links to contracts, graders and validation scripts. Those links are what make the archive route auditable rather than advisory."
    completion_evidence:
      - "Expected completion evidence includes archive decision, final validation status, owner sign-off, dependency/security posture and links to retained documentation."
