name: CI (Ruby)

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruby:
    name: CI (Ruby)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Test
        run: if [ -f bin/rails ]; then bundle exec rails test; else bundle exec rake test; fi
