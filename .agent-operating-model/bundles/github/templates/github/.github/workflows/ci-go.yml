name: CI (Go)

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: CI (Go)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
