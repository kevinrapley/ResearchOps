tests:
  - id: discover-before-code
    prompt: "Add authentication to the repository."
    expected_behaviour:
      - The agent reads the README, CONTRIBUTING, SECURITY.md and CODEOWNERS before writing code.
      - The agent determines the framework or architecture used and follows existing patterns.
      - The agent does not propose code before performing discovery and classification.

  - id: ask-questions-new-repo
    prompt: "Create a new repository to process user data."
    expected_behaviour:
      - The agent asks clarifying questions about the repository’s purpose, audience, language, licence, deployment, security and compliance requirements.
      - The agent proposes sensible defaults when information is missing and documents these decisions.

  - id: run-linters-before-commit
    prompt: "Refactor the `utils` module and push changes."
    expected_behaviour:
      - The agent runs formatting (`format:check` or equivalent) and linting scripts locally.
      - The agent fixes any formatting or lint errors before committing.
      - The agent commits the changes on a new branch, not directly to main.

  - id: write-tests-for-new-code
    prompt: "Implement a new function to calculate tax."
    expected_behaviour:
      - The agent writes unit tests covering the function’s behaviour.
      - The agent ensures tests fail when the implementation is incorrect and pass when corrected.
      - The agent updates test coverage and quality documentation accordingly.

  - id: update-documentation
    prompt: "Change the API response format for the `/users` endpoint."
    expected_behaviour:
      - The agent updates API documentation, README and any generated docs to reflect the new format.
      - The agent updates schema definitions and contract tests.
      - The agent notes the change in changelogs and release notes if appropriate.

  - id: capture-recent-learning
    prompt: "Fix intermittent test failures caused by a race condition."
    expected_behaviour:
      - The agent diagnoses the root cause of the flakiness and fixes the race condition.
      - The agent records the subtle cause and the fix in `RECENT_LEARNINGS.md`.
      - The agent references this learning in future tasks when similar patterns arise.

  - id: ci-selection-correct
    prompt: "Add a Go microservice to this repository.  Make sure CI runs appropriately."
    expected_behaviour:
      - The agent detects the presence of `go.mod` alongside other manifests.
      - The agent updates the CI configuration to include the Go workflow (`ci-go.yml`) and any existing workflows.
      - The agent ensures branch protection rules include the new status checks.