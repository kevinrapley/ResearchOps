bundle:
  id: github-diamond-standard
  name: GitHub Diamond Standard Prompt Bundle
  version: 2.9.3
  status: full-release-readiness
  default_mode: repository-operator
  prompt_body: prompt.body.xml
design:
  prompt_markup: native semantic XML
  assurance_markup: native semantic XML grader modules
  output_contract: output.schema.json
  grade_contract: grade.schema.json
  variables_contract: variables.schema.json
assembly:
  always_load:
  - references/source-catalog.xml
  - references/repository-charter.xml
  - references/repository-conventions.xml
  - references/implementation-workflow.xml
  - references/developer-control-contract.xml
  - references/quality-gates.xml
  - references/ci-selection-guidelines.xml
  - references/code-confidence-pack.xml
  - references/accessibility-confidence-pack.xml
  - references/formatter-and-style-policy.xml
  - references/documentation-quality-pack.xml
  - references/github-settings-pack.xml
  - references/security-supply-chain-pack.xml
  - references/performance-confidence-pack.xml
  - references/performance-budget-control.xml
  - references/architecture-integrity-pack.xml
  - references/template-orchestration.xml
  - references/agent-evidence.xml
  - references/harm-register.xml
  - references/sbom-and-attestation.xml
  - references/rule-source-traceability.xml
  - references/eval-harness.xml
  - references/archetype-control-profiles.xml
  - references/github-tooling-mutation-policy.xml
  - references/github-best-practices.xml
  mode_modules:
  - modes/repo-discovery.xml
  - modes/repo-instantiate.xml
  - modes/repo-build.xml
  - modes/repo-fix.xml
  - modes/repo-review.xml
  - modes/repo-security.xml
  - modes/repo-release.xml
  - modes/repo-conformance.xml
  - modes/repo-docs.xml
  - modes/repo-archive.xml
  role_modules:
  - roles/architect.xml
  - roles/developer.xml
  - roles/docs-lead.xml
  - roles/maintainer.xml
  - roles/performance-engineer.xml
  - roles/qa.xml
  - roles/repository-operator.xml
  - roles/security.xml
  contract_modules:
  - contracts/accessibility-evidence.schema.json
  - contracts/agent-evidence.schema.json
  - contracts/conformance-record.schema.json
  - contracts/endpoint-catalog.schema.json
  - contracts/eval-result.schema.json
  - contracts/eval.schema.json
  - contracts/evidence-state.schema.json
  - contracts/gap-register.schema.json
  - contracts/github-settings.schema.json
  - contracts/grade-result.schema.json
  - contracts/harm-register.schema.json
  - contracts/issue-contract.schema.json
  - contracts/live-release-policy.schema.json
  - contracts/performance-budget.schema.json
  - contracts/provenance-record.schema.json
  - contracts/pull-request-contract.schema.json
  - contracts/release-contract.schema.json
  - contracts/release-gate-report.schema.json
  - contracts/repository-contract.schema.json
  - contracts/safe-audit-trail.schema.json
  - contracts/sbom-record.schema.json
  - contracts/template-registry.schema.json
  - contracts/trusted-attestation-verification.schema.json
  - contracts/workflow-contract.schema.json
  grader_modules:
  - graders/accessibility-grader.xml
  - graders/ci-selection-grader.xml
  - graders/code-confidence-grader.xml
  - graders/conformance-grader.xml
  - graders/discovery-grader.xml
  - graders/documentation-grader.xml
  - graders/ethics-grader.xml
  - graders/github-settings-grader.xml
  - graders/performance-grader.xml
  - graders/pr-readiness-grader.xml
  - graders/provenance-grader.xml
  - graders/recent-learnings-grader.xml
  - graders/release-grader.xml
  - graders/sbom-grader.xml
  - graders/security-grader.xml
  - graders/template-registry-grader.xml
  template_registry: template-registry.yaml
evaluation_flow:
  steps:
  - infer_context
  - select_mode
  - load_required_modules
  - validate_inputs
  - plan_with_contracts
  - select_templates
  - implement_or_review
  - validate_quality_gates
  - produce_agent_evidence
  - grade_behaviour
  - update_conformance_and_gaps
  - emit_final_output
  blocking_labels:
  - fail_revise
  - fail_escalate
  - fail_refuse