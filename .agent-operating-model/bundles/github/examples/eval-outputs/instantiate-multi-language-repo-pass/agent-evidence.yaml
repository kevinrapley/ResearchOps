github_settings:
  desired_state: &desired_state
    default_branch: main
    branch_protection:
      required_reviews: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      required_status_checks:
        - CI (Node)
        - CI (Python)
        - CI (Conformance)
        - CI (Documentation Quality)
        - CodeQL
        - Dependency Review
      linear_history: true
      allow_force_pushes: false
      allow_deletions: false
    workflow_permissions: read
    security_features:
      dependabot: true
      secret_scanning: true
      push_protection: true
      code_scanning: true
      dependency_review: true
      sbom_on_release: true
  observed_state: *desired_state
  verification_method: file

security:
  dependency_review: true
  secret_scanning: true
  code_scanning: true
  codeowners_present: true
  notes: File-based security posture is complete for the eval fixture; live API verification remains a recorded gap.

accessibility:
  required: false
  automated_checks:
    - not applicable because the fixture has no web interface
  keyboard_checks:
    - not applicable because the fixture has no interactive user journey
  focus_checks:
    - not applicable because the fixture has no browser-rendered surface
  screen_reader_smoke_checks:
    - not applicable because the fixture has no web interface
  known_defects:
    - no accessibility defects recorded for this non-web fixture
  release_decision: not_applicable
  manual_requirements_covered: false
  automated_requirements_covered: false

performance:
  required: false
  decision: not_applicable
  rationale: No service endpoint, frontend or benchmarkable runtime surface is generated in this fixture.

harms:
  - No public user-facing service is generated by this fixture.
  - No personal data flow is represented by this fixture.

claims:
  - The repository has Node and Python project signals.
  - The selected workflow set covers Node, Python, conformance, documentation quality, CodeQL and dependency review.
  - Repository governance files are present.
  - Eval-specific gaps are recorded rather than hidden.

risks:
  - File-based settings evidence does not prove live GitHub configuration.
  - This fixture should not be treated as a production release decision.

test_results:
