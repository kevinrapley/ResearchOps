name: CI (Node)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  node-validation:
    name: Validate Node fixture
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run lint command
        run: npm run lint

      - name: Run test command
        run: npm test

      - name: Run build command
        run: npm run build
