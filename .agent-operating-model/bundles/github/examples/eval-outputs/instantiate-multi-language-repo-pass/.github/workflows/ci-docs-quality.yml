name: CI (Documentation Quality)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  documentation-validation:
    name: Validate documentation fixture
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required documentation files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f docs/README.md
          test -f templates/README.md

      - name: Check documentation has substantive content
        run: |
          grep -q "What this example demonstrates" README.md
          grep -q "Validation" CONTRIBUTING.md
          grep -q "Evidence expectations" SECURITY.md
          grep -q "Expected contents" docs/README.md
          grep -q "Boundary" templates/README.md

      - name: Check local learning file exists
        run: grep -q "Initial repository scaffold created" RECENT_LEARNINGS.md
