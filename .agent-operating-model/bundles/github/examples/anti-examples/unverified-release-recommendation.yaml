id: unverified-release-recommendation
kind: anti-example
status: canonical

user_prompt: >
  Check whether this repository can be released today.

incorrect_agent_behaviour: >
  The agent recommends release readiness while required release evidence is
  missing, unknown or contradicted by repository state.

why_this_is_wrong:
  - It treats unknown evidence as passed.
  - It weakens release assurance.
  - It hides blocking gaps from reviewers.
  - It prevents a clear release decision trail.

expected_agent_behaviour:
  - Inspect release evidence before giving a judgement.
  - Separate passing, failing, missing and unknown evidence.
  - Mark the release not ready when blocking evidence is missing.
  - Record the next action needed to close each blocking gap.

expected_grade: fail_revise

contracts_relevant:
  - contracts/release-contract.schema.json
  - contracts/agent-evidence.schema.json

graders_relevant:
  - graders/release-grader.xml
  - graders/provenance-grader.xml
