name: CI (Documentation Quality)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  documentation-validation:
    name: Validate live-gate documentation evidence
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required documentation files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f RECENT_LEARNINGS.md
          test -f docs/README.md
          test -f templates/README.md

      - name: Check documentation explains fixture purpose
        run: |
          grep -q "high-assurance live-gate" README.md
          grep -q "release-gate assurance fixture" CONTRIBUTING.md
          grep -q "security evidence" SECURITY.md
          grep -q "positive live-gate fixture" RECENT_LEARNINGS.md
          grep -q "structured files" docs/README.md
          grep -q "repository-local templates" templates/README.md
