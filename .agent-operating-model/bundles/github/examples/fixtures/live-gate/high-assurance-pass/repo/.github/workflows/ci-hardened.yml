name: CI (Hardened Fixture)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  hardened-fixture-validation:
    name: Validate hardened workflow evidence
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check workflow lock evidence exists
        run: test -f workflow-action-lock.yaml

      - name: Check trusted release evidence exists
        run: |
          test -f attestation.json
          test -f trusted-attestation-verification.json
          test -f sbom.json
          test -f sigstore-bundle.json

      - name: Check live-gate assurance evidence exists
        run: |
          test -f accessibility-evidence.yaml
          test -f performance-budget.yaml
          test -f performance-results.yaml
          test -f agent-evidence.yaml

      - name: Check fixture profile marker
        run: grep -q "high-assurance" agent-evidence.yaml
