name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '24 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyse:
    name: Analyse high-assurance fixture code
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Check out repository
        uses: actions/checkout@1234567890abcdef1234567890abcdef12345678

      - name: Initialise CodeQL
        uses: github/codeql-action/init@4567890abcdef1234567890abcdef12345678901
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@567890abcdef1234567890abcdef123456789012

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@67890abcdef1234567890abcdef1234567890123
        with:
          category: /language:${{ matrix.language }}
