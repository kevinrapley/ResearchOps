    - Code panel scroll does not trap keyboard focus
  screen_reader_smoke_checks:
    - NVDA with Firefox
    - VoiceOver with Safari
  known_defects:
    - A11Y-1 closed
    - A11Y-2 closed
  release_decision: pass
  manual_requirements_covered: true
  automated_requirements_covered: true
  evidence_file: accessibility-evidence.yaml
performance:
  budget_file: performance-budget.yaml
  results_file: performance-results.yaml
  release_decision: pass
  measurements:
    lighthouse_performance_score: 0.92
    lighthouse_accessibility_score: 0.98
    lcp_ms: 1800
    fcp_ms: 1050
    total_blocking_time_ms: 45
    cumulative_layout_shift: 0.01
  blocking_measurements_failed: 0
  advisory_measurements_failed: 0
harms: []
claims:
  - Tests passed with structured evidence.
  - High-assurance root fixture evidence is present and expanded.
  - Accessibility evidence supports a pass release decision.
  - Performance evidence is measured against an explicit budget.
  - SBOM, attestation, Sigstore bundle and trusted verification evidence are represented.
risks:
  - Fixture evidence is synthetic and must not be treated as proof of a real production release.
  - Real high-assurance releases must verify live GitHub API state where the selected profile requires it.
