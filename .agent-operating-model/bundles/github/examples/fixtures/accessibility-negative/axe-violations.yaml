fixture_metadata:
  id: accessibility-negative-axe-violations
  kind: negative_accessibility_fixture
  expected_validator_result: fail
  failure_reason: axe output contains violations
  purpose: >
    Proves that structured accessibility evidence must fail when axe-core reports
    one or more violations, even when Pa11y, Lighthouse, keyboard testing,
    screen-reader testing and known defects appear acceptable.
  validator_expected_message: axe output contains violations

automated_checks:
  axe:
    tool: axe-core
    file: results/axe-fail.json
    interpretation: >
      This result is intentionally failing because it contains a colour contrast
      violation. The validator must not allow release_decision: pass to override
      automated violation evidence.
  pa11y:
    tool: pa11y
    file: results/pa11y-pass.json
    interpretation: Passing control result used to isolate the axe failure.
  lighthouse:
    tool: lighthouse
    file: results/lighthouse-pass.json
    interpretation: Passing control result used to isolate the axe failure.

keyboard_tests:
  - name: Keyboard journey
    steps:
      - Load the example form page.
      - Tab through all interactive elements.
      - Confirm focus order follows the visual order.
      - Submit the form using the keyboard.
    result: pass
    notes: Keyboard evidence is intentionally passing so the fixture fails only on axe violations.

screen_reader_tests:
  - screen_reader: NVDA
    browser: Firefox
    result: pass
    notes: Form labels and button purpose are announced correctly in this control evidence.

assistive_technology_matrix:
  - technology: NVDA
    browser: Firefox
    platform: Windows
    result: pass
    notes: Control assistive-technology combination used to isolate automated axe failure.

defects:
  - id: A11Y-LOW
    severity: low
    status: closed
    summary: Closed low-severity defect included to show that defect evidence is not the blocker.

release_decision: pass

expected_failure:
  blocking_signal: automated_checks.axe.file
  explanation: >
    The release decision is deliberately inconsistent with the automated evidence.
    The validator should fail this fixture because axe reports a violation.
