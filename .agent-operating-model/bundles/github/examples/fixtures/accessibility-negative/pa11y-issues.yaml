fixture_metadata:
  id: accessibility-negative-pa11y-issues
  kind: negative_accessibility_fixture
  expected_validator_result: fail
  failure_reason: Pa11y output contains issues
  purpose: >
    Proves that structured accessibility evidence must fail when Pa11y reports
    one or more issues, even when axe, Lighthouse, keyboard testing,
    screen-reader testing and known defects appear acceptable.
  validator_expected_message: pa11y output contains issues

automated_checks:
  axe:
    tool: axe-core
    file: results/axe-pass.json
    interpretation: Passing control result used to isolate the Pa11y failure.
  pa11y:
    tool: pa11y
    file: results/pa11y-fail.json
    interpretation: >
      This result is intentionally failing because it contains a missing image
      alternative-text issue. The validator must not allow release_decision: pass
      to override Pa11y issue evidence.
  lighthouse:
    tool: lighthouse
    file: results/lighthouse-pass.json
    interpretation: Passing control result used to isolate the Pa11y failure.

keyboard_tests:
  - name: Keyboard journey
    steps:
      - Load the example content page.
      - Tab through links, form controls and buttons.
      - Confirm all interactive controls are reachable.
      - Confirm no keyboard trap occurs.
    result: pass
    notes: Keyboard evidence is intentionally passing so the fixture fails only on Pa11y issues.

screen_reader_tests:
  - screen_reader: NVDA
    browser: Firefox
    result: pass
    notes: Landmarks and form controls are announced correctly in this control evidence.

assistive_technology_matrix:
  - technology: NVDA
    browser: Firefox
    platform: Windows
    result: pass
    notes: Control assistive-technology combination used to isolate automated Pa11y failure.

defects:
  - id: A11Y-LOW
    severity: low
    status: closed
    summary: Closed low-severity defect included to show that defect evidence is not the blocker.

release_decision: pass

expected_failure:
  blocking_signal: automated_checks.pa11y.file
  explanation: >
    The release decision is deliberately inconsistent with the automated evidence.
    The validator should fail this fixture because Pa11y reports an issue.
