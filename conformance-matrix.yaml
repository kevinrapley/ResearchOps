records:
  - id: flux-semantic-interactive-coverage
    control: Every rendered or dynamically inserted ResearchOps link, button, field, form and help control receives privacy-safe purpose-led Flux key and role attributes before capture, while the positional fallback remains available for unforeseen controls.
    evidence:
      - public/js/flux-researchops-tracker.1.2.0.js
      - public/js/project-dashboard.js
      - tests/e2e/flux-semantic-coverage.spec.js
      - tests/flux-semantic-instrumentation.test.js
      - docs/agent-audit/reasoning/2026/07/12/flux-semantic-interactive-coverage.md
    status: implemented
    risk: high
    owner: repository-maintainers

  - id: flux-tracker-inactivity-session-boundary
    control: ResearchOps creates a new pseudonymous Flux session after 30 minutes without a captured interaction while retaining the returning visitor identifier.
    evidence:
      - public/js/flux-researchops-tracker.1.2.0.js
      - tests/flux-session-lifecycle.test.js
      - docs/agent-audit/reasoning/2026/07/12/flux-session-inactivity-boundary.md
    status: implemented
    risk: high
    owner: repository-maintainers

  - id: flux-tracker-event-contract-alignment
    control: The deployed ResearchOps tracker emits the Flux collector's accepted event-contract version independently from its JavaScript asset version.
    evidence:
      - public/js/flux-researchops-tracker.1.2.0.js
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/12/flux-tracker-schema-version-fix.md
    status: implemented
    risk: high
    owner: repository-maintainers

  - id: flux-tracker-session-dimension-signals
    control: The ResearchOps tracker records only consented content-free signal categories required for Flux session dimensions.
    evidence:
      - public/js/flux-researchops-tracker.1.1.0.js
      - public/js/flux-researchops-tracker.1.2.0.js
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/11/flux-tracker-session-dimension-signals.md
    status: implemented
    risk: high
    owner: repository-maintainers

  - id: flux-tracker-rendered-page-coverage
    control: Every rendered ResearchOps page loads the reviewed, versioned Flux tracker from its source layout or committed static page shell.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - public/pages/**/index.html
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/11/flux-tracker-rendered-page-remediation.md
    status: implemented
    risk: medium
    owner: repository-maintainers

  - id: github-governance-files
    control: GitHub governance files use recognised repository paths.
    evidence:
      - .github/CODEOWNERS
      - .github/pull_request_template.md
      - PR #117
    status: implemented
    risk: low
    owner: repository-maintainers

  - id: package-ci-contract
    control: Package scripts separate write-mode formatting from CI check-mode validation.
    evidence:
      - package.json
      - .github/workflows/ci.yml
      - PR #118
    status: implemented
    risk: low
    owner: repository-maintainers

  - id: release-gate-workflow
    control: Repository release assurance is joined into a dedicated Release Gate workflow.
    evidence:
      - .github/workflows/release-gate.yml
      - PR #119
    status: implemented
    risk: medium
    owner: repository-maintainers

  - id: accessibility-baseline
    control: Accessibility remediation must be evidence-led and must not change clean baseline behaviour speculatively.
    evidence:
      - Accessibility audit on main
      - PR #120 closed unmerged
      - RECENT_LEARNINGS.md
    status: implemented
    risk: medium
    owner: repository-maintainers

  - id: cloudflare-worker-deployment
    control: Cloudflare Worker deployment validates before deploy and uses repository secrets for account/token material.
    evidence:
      - .github/workflows/deploy-worker.yml
      - infra/cloudflare/wrangler.toml
    status: implemented
    risk: medium
    owner: repository-maintainers

  - id: release-evidence-model
    control: Repository has release evidence files for traceability and future branch-protection decisions.
    evidence:
      - RECENT_LEARNINGS.md
      - conformance-matrix.yaml
      - gap-register.yaml
      - github-settings.yaml
      - release-evidence.yaml
      - configuration-evidence.yaml
    status: proposed
    risk: low
    owner: repository-maintainers
  - id: flux-add-objective-semantic-journey
    control: The Add Objective journey exposes stable content-free Flux keys and distinguishes automatic focus, keyboard input and focus exit.
    evidence:
      - src/govuk/templates/pages/project-dashboard.njk
      - public/js/flux-researchops-tracker.1.2.0.js
      - tests/flux-semantic-instrumentation.test.js
      - tests/flux-focus-narrative-events.test.js
    status: implemented
    risk: medium
    owner: repository-maintainers
