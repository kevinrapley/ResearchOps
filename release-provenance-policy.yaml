release_provenance:
  repository: kevinrapley/ResearchOps
  evidence_version: 1
  prepared_at: 2026-04-30
  workflow: .github/workflows/release-provenance.yml
  artifact_name: researchops-release-provenance
  triggers:
    - push_tag_v_prefix
    - workflow_dispatch
  required_before_tagged_release:
    - Release Gate has passed on the release commit.
    - Accessibility audit is clean on the release commit.
    - Security audit policy has no blocking findings.
    - Deployment toolchain evidence is current.
    - Release evidence commit references match the release commit.
  generated_artifacts:
    - artifacts/release-provenance/release-provenance-manifest.json
    - artifacts/release-provenance/slsa-provenance.json
    - artifacts/release-provenance/dsse-envelope.json
    - artifacts/researchops-release-provenance.tgz
  trusted_attestation:
    github_artifact_attestation: true
    action: actions/attest@v4
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    verification:
      command: gh attestation verify artifacts/researchops-release-provenance.tgz --repo kevinrapley/ResearchOps
      note: Run verification after the tagged release workflow completes and the attestation is available.
  limitations:
    - The DSSE-shaped envelope generated by scripts/release-provenance.mjs is evidence metadata, not a trusted cryptographic signature.
    - Trusted verification depends on GitHub artifact attestation availability for the repository and plan.
    - Live release decisions still require the Release Gate and branch protection checks to pass.
