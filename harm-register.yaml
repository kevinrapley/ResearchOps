harms:
  - id: HARM-FLUX-WRITING-001
    harm: UK English spelling, grammar or casing indicators could be treated as a judgement about a visitor, or could disadvantage people whose names, dialect, disability, education or writing style differ from the analyser's assumptions.
    affected_groups:
      - Consenting ResearchOps visitors
      - Disabled and neurodivergent visitors
      - Visitors who use dialects or English as an additional language
    likelihood: medium
    severity: high
    mitigation: Label counts as possible issues, keep analysis on-device and en-GB-specific, export no words or suggestions, prohibit literacy, intelligence, professionalism, personality and protected-characteristic inference, prohibit automated decisions, and validate with representative accessibility and privacy review before operational use.
    residual_risk: medium
    owner: product-lead
    escalation_route: Product owner, accessibility lead and privacy lead
    release_decision: proceed-with-monitoring

  - id: HARM-FLUX-SESSION-001
    harm: Analytics users could interpret a long-lived browser tab as one continuous journey, obscuring returning visits and inflating session duration.
    affected_groups:
      - Consenting ResearchOps visitors
      - ResearchOps service analysts
    likelihood: low
    severity: medium
    mitigation: Apply a tested 30-minute inactivity boundary, retain metadata-only identifiers and monitor production session start and last-seen timestamps after deployment.
    residual_risk: low
    owner: repository-maintainers
    escalation_route: Product owner and privacy lead
    release_decision: proceed-with-monitoring
  - id: HARM-FLUX-NARRATIVE-001
    harm: Ambiguous generated labels or stale pointer state could misrepresent how a consenting visitor completed a ResearchOps task.
    affected_groups:
      - Keyboard users
      - Assistive-technology users
      - ResearchOps service analysts
    likelihood: low
    severity: medium
    mitigation: Declare stable content-free keys across important journeys, annotate current and newly inserted controls before capture, browser-audit purpose-led coverage, record automatic focus explicitly, separate pre-input dwell and active typing from total focus time, and use only a recent pointer or Tab event as the focus-exit method.
    residual_risk: low
    owner: repository-maintainers
    escalation_route: Product owner, accessibility lead and privacy lead
    release_decision: proceed-with-monitoring
  - id: HARM-FLUX-SEMANTIC-002
    harm: Automatically derived analytics keys could disclose user content or record identifiers if uncontrolled DOM values were treated as semantic purpose.
    affected_groups:
      - Consenting ResearchOps visitors
      - Research participants represented in ResearchOps records
    likelihood: low
    severity: high
    mitigation: Derive only from controlled attribute names, allow-listed action and option values, field names, sanitised structural option IDs, element IDs, HTTP(S) destination paths without query strings, controlled page keys and container identities; map mail and telephone links to fixed contact purposes; ignore visible and accessible text, entered values, arbitrary data values and URL query data; strip UUIDs, long record tokens, long hexadecimal tokens and non-structural numeric ordinals; retain explicit reviewed keys for important dynamic journeys.
    residual_risk: low
    owner: repository-maintainers
    escalation_route: Product owner, security lead and privacy lead
    release_decision: proceed-with-monitoring
