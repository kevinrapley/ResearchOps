deployment_toolchain:
  repository: kevinrapley/ResearchOps
  evidence_version: 2
  prepared_at: 2026-05-06
  cloudflare_worker:
    tool: wrangler
    version: 4.34.0
    invocation: npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/wrangler.toml
    workflow: .github/workflows/deploy-worker.yml
    config: infra/cloudflare/wrangler.toml
  cloudflare_agent_gateway:
    tool: wrangler
    version: 4.34.0
    invocation: npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/agent-gateway/wrangler.toml
    workflow: .github/workflows/deploy-agent-gateway.yml
    config: infra/cloudflare/agent-gateway/wrangler.toml
    deployment_mode: manual workflow_dispatch until reviewed
  policy:
    pinning_required: true
    floating_latest_allowed: false
    upgrade_cadence: Review before tagged releases or when Cloudflare requires a compatibility update.
    validation_before_upgrade:
      - npm ci
      - npm run validate
      - npm run lint
      - npm test
      - npx --yes wrangler@${WRANGLER_VERSION} --version
    validation_before_worker_deploy:
      - npm ci
      - npm run validate
      - npx --yes wrangler@${WRANGLER_VERSION} --version
    validation_before_agent_gateway_deploy:
      - npm ci
      - npm run validate
      - npm run lint
      - npm test
      - npx --yes wrangler@${WRANGLER_VERSION} --version
      - npx --yes wrangler@${WRANGLER_VERSION} deploy --config infra/cloudflare/agent-gateway/wrangler.toml --dry-run
    rollback:
      method: Revert the Wrangler version change in deployment-toolchain.yaml, .github/workflows/deploy-worker.yml and .github/workflows/deploy-agent-gateway.yml.
  notes:
    - Keep WRANGLER_VERSION in the workflows aligned with this file.
    - Do not use wrangler@latest in release or deployment workflows.
    - Record the deployed Wrangler version in workflow logs before deploy.
    - The ResearchOps API Worker and ResearchOps Agent Gateway Worker are separate deployables.
    - Agent gateway changes must not trigger the main API Worker deployment workflow.
