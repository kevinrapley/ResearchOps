gaps:
  - id: flux-uk-english-writing-validation
    title: Validate UK English writing indicators before operational interpretation
    status: open
    severity: high
    owner: product-lead
    context: Dictionary and grammar heuristics can produce false positives for names, specialist language, dialects, disability-related writing patterns and valid stylistic choices. Counts are service-friction signals, not validated person-level measures.
    mitigation: Keep the explicit en-GB baseline, possible-issue wording, on-device-only analysis and no-automated-decision boundary; fetch protected dictionary assets with same-origin credentials while keeping collector credentials omitted; review a representative, consented golden corpus with privacy and accessibility leads before using the indicators operationally.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/12/flux-uk-english-writing-signals.md

  - id: flux-field-timing-semantics
    title: Separate total focus, pre-input dwell and active typing time
    status: implemented
    severity: high
    owner: repository-maintainers
    context: The previous ResearchOps-local tracker conflated publisher and analytics ownership and calculated character rate locally.
    mitigation: Delegate timing and words-per-minute calculation to the versioned hosted Flux module; retain only the include and semantic attributes in ResearchOps.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/implementation/flux-semantic-instrumentation.md

  - id: flux-tracker-inactivity-session-boundary
    title: Separate returning ResearchOps visits into behavioural sessions
    status: implemented
    severity: high
    owner: repository-maintainers
    context: The previous ResearchOps-local tracker equated the lifetime of sessionStorage with a behavioural session and duplicated Flux product logic in the publisher.
    mitigation: The hosted Flux module owns the 30-minute inactivity boundary and persistent returning-visitor identifier; ResearchOps owns only the include and semantic attributes.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/implementation/flux-semantic-instrumentation.md

  - id: flux-tracker-event-contract-alignment
    title: Align the ResearchOps tracker payload with the Flux event contract
    status: implemented
    severity: high
    owner: repository-maintainers
    context: The cache-busted 1.2.0 JavaScript asset emitted schema_version 1.2.0 while the Flux collector accepted contract 1.1.0, causing all production interactions to return HTTP 400 invalid_event.
    mitigation: Emit schema_version 1.1.0, assert it independently from the asset URL, and advance the cache key so browsers retrieve the corrected tracker.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/12/flux-tracker-schema-version-fix.md

  - id: flux-session-dimension-interpretation
    title: Validate Flux session-dimension heuristics before operational interpretation
    status: open
    severity: high
    owner: product-lead
    context: ResearchOps emits additional consented metadata-only categories so Flux can calculate the demo model per session. The scores remain service-improvement heuristics and are not validated person-level measures.
    mitigation: Keep the no-automated-decision boundary, complete the Flux golden-corpus validation and review the data-protection and accessibility evidence before operational use.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - docs/agent-audit/reasoning/2026/07/11/flux-tracker-session-dimension-signals.md

  - id: flux-tracker-rendered-page-coverage
    title: Ensure the Flux tracker is loaded by rendered ResearchOps pages
    status: implemented
    severity: high
    owner: repository-maintainers
    context: PR #475 versioned the static tracker asset but placed its reference only in an unused partial, leaving normal rendered pages without instrumentation.
    mitigation: Load the versioned tracker from the GOV.UK source layout, update the three committed static page shells outside that renderer, regenerate all GOV.UK outputs and assert every rendered page includes the asset.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - public/pages/account/sign-in/index.html
      - public/pages/synthesize/index.html
      - public/pages/team/registration-requests/index.html
      - tests/flux-behaviour-tracker-route-state.test.js
      - docs/agent-audit/reasoning/2026/07/11/flux-tracker-rendered-page-remediation.md

  - id: branch-protection-release-gate-required
    title: Require Release Gate before merge
    status: in-progress
    severity: high
    owner: repository-maintainers
    context: ResearchOps now has a dedicated Release Gate workflow, but branch protection must be configured in GitHub settings to require it before merge.
    mitigation: Enable branch protection for main and require the exact Release Gate status check after GitHub exposes the check name.
    evidence:
      - .github/workflows/release-gate.yml
      - PR #119
      - docs/release-assurance/branch-protection-verification.md
      - branch-protection-evidence.yaml

  - id: security-audit-release-blocking
    title: Decide when high-severity dependency findings become blocking
    status: implemented
    severity: medium
    owner: repository-maintainers
    context: The Release Gate now runs a policy-based npm audit check. Runtime high or critical findings block release. Unknown-scope high or critical findings block release until classified. Development-only critical findings block release. Development-only low, moderate and high findings are recorded as advisory while dependency upgrades are planned.
    mitigation: Keep `security-audit-policy.json` and `security-audit-triage.yaml` current. Revisit the policy before tagged releases and after dependency upgrades.
    evidence:
      - .github/workflows/release-gate.yml
      - .github/workflows/security.yml
      - security-audit-policy.json
      - security-audit-triage.yaml
      - scripts/security-audit-policy.sh
      - scripts/security-audit-policy.mjs

  - id: dependency-upgrade-security-findings
    title: Remediate advisory development dependency findings
    status: open
    severity: medium
    owner: repository-maintainers
    context: Current npm audit findings are classified as development-only and advisory under the release policy, but they should still be remediated through safe dependency upgrades.
    mitigation: Upgrade affected toolchain dependencies, then rerun validation, route-state tests, Cucumber tests, Playwright tests, Release Gate and Accessibility.
    evidence:
      - security-audit-triage.yaml
      - package.json
      - package-lock.json

  - id: deployment-tool-pinning
    title: Pin Wrangler deployment tooling
    status: implemented
    severity: medium
    owner: repository-maintainers
    context: The deploy workflow now uses a pinned Wrangler version through `WRANGLER_VERSION` instead of `wrangler@latest`.
    mitigation: Keep `.github/workflows/deploy-worker.yml` aligned with `deployment-toolchain.yaml`, and review the pinned Wrangler version before tagged releases or Cloudflare compatibility changes.
    evidence:
      - .github/workflows/deploy-worker.yml
      - infra/cloudflare/wrangler.toml
      - deployment-toolchain.yaml
      - docs/deployment/wrangler-toolchain.md

  - id: release-provenance-artifacts
    title: Add signed or attested release artifacts
    status: implemented
    severity: medium
    owner: repository-maintainers
    context: The repository now has release provenance generation and a GitHub artifact attestation workflow for tagged releases.
    mitigation: Run the Release Provenance workflow on tagged releases and verify the generated attestation before treating release provenance as trusted.
    evidence:
      - .github/workflows/release-provenance.yml
      - scripts/release-provenance.mjs
      - release-provenance-policy.yaml

  - id: live-github-settings-verification
    title: Verify repository settings from GitHub's server state
    status: open
    severity: medium
    owner: repository-maintainers
    context: github-settings.yaml records intended repository policy, but live GitHub settings still need to be checked through the GitHub UI or API.
    mitigation: Compare intended policy with live branch protection, required checks, CODEOWNERS enforcement, Actions permissions and security settings.
    evidence:
      - github-settings.yaml
      - branch-protection-evidence.yaml
  - id: flux-uninstrumented-control-context
    title: Maintain semantic Flux coverage across ResearchOps journeys
    status: implemented
    severity: low
    owner: repository-maintainers
    context: Important journeys use explicit reviewed attributes, while the hosted Flux module owns safe structural fallback interpretation for unforeseen controls.
    mitigation: Keep explicit stable keys on important journeys, audit authored keys and roles, and keep all fallback interpretation in Flux Behaviour rather than ResearchOps.
    evidence:
      - src/govuk/templates/layouts/researchops.njk
      - docs/implementation/flux-semantic-instrumentation.md
      - tests/flux-semantic-instrumentation.test.js
      - tests/e2e/flux-semantic-coverage.spec.js
